# products.yaml - Maps products to their available features
#
# This file defines vCluster product tiers and which features are available in each.
# Used by the FeatureTable component to display product/feature matrices.
#
# Tier mapping from old pricing structure:
# - OSS → Open Source
# - Core (old free) → Open Source
# - Starter → Dev
# - Advanced → Prod
# - Ultimate → Scale

products:
  oss:
    name: "Open Source"
    description: "Open source virtual Kubernetes clusters"
    pricing_url: "https://www.vcluster.com/pricing"
    features:
      # Core functionality (OSS/Core features from old pricing)
      - virtual-clusters
      - basic-syncing
      - multi-namespace-mode

      # Backing store options
      - deployed-etcd
      - sqlite-backing-store

      # Kubernetes distributions
      - k8s-distros

  free:
    name: "Free"
    description: "Free tier with enhanced features for development and testing"
    pricing_url: "https://www.vcluster.com/pricing"
    features:
      # All OSS features
      - virtual-clusters
      - basic-syncing
      - multi-namespace-mode
      - deployed-etcd
      - sqlite-backing-store
      - k8s-distros

      # Free tier enhancements
      - platform-integration
      - sleep-mode

  dev:
    name: "Dev"
    description: "Development tier for teams (similar to old Starter)"
    pricing_url: "https://www.vcluster.com/pricing"
    features:
      # All OSS features
      - virtual-clusters
      - basic-syncing
      - multi-namespace-mode
      - deployed-etcd
      - sqlite-backing-store
      - k8s-distros

      # All Free features
      - platform-integration
      - sleep-mode

      # Dev-specific: Config (from old Starter)
      - custom-resource-syncing
      - auto-delete
      - custom-dns

      # Dev-specific: Admin (from old Starter)
      - sso
      - template-versioning

      # Dev-specific: Integrations (from old Starter)
      - argocd-integration
      - vault-integration
      - cert-manager-integration
      - host-path-mapper

  prod:
    name: "Prod"
    description: "Production-ready features (similar to old Advanced)"
    pricing_url: "https://www.vcluster.com/pricing"
    contact_sales_url: "https://www.vcluster.com/enterprise-demo"
    features:
      # All OSS features
      - virtual-clusters
      - basic-syncing
      - multi-namespace-mode
      - deployed-etcd
      - sqlite-backing-store
      - k8s-distros

      # All Free features
      - platform-integration
      - sleep-mode

      # All Dev features
      - custom-resource-syncing
      - auto-delete
      - custom-dns
      - sso
      - template-versioning
      - argocd-integration
      - vault-integration
      - cert-manager-integration
      - host-path-mapper

      # Prod-specific: Config (from old Advanced)
      - embedded-etcd
      - external-database
      - sync-patches

      # Prod-specific: Admin (from old Advanced)
      - quotas
      - audit-logging
      - ui-customization-basic

      # Prod-specific: Integrations (from old Advanced)
      - workload-identity
      - external-secrets-operator
      - rancher-integration

      # Prod-specific: Additional production features
      - high-availability

  scale:
    name: "Scale"
    description: "Enterprise scale with compliance (similar to old Ultimate)"
    pricing_url: "https://www.vcluster.com/pricing"
    contact_sales_url: "https://www.vcluster.com/enterprise-demo"
    features:
      # All OSS features
      - virtual-clusters
      - basic-syncing
      - multi-namespace-mode
      - deployed-etcd
      - sqlite-backing-store
      - k8s-distros

      # All Free features
      - platform-integration
      - sleep-mode

      # All Dev features
      - custom-resource-syncing
      - auto-delete
      - custom-dns
      - sso
      - template-versioning
      - argocd-integration
      - vault-integration
      - cert-manager-integration
      - host-path-mapper

      # All Prod features
      - embedded-etcd
      - external-database
      - sync-patches
      - quotas
      - audit-logging
      - ui-customization-basic
      - workload-identity
      - external-secrets-operator
      - rancher-integration
      - high-availability

      # Scale-specific: Config (from old Ultimate)
      - external-db-connector
      - fips-mode

      # Scale-specific: Admin (from old Ultimate)
      - multiple-sso
      - ui-customization-advanced
      - custom-terms

      # Scale-specific: Integrations (from old Ultimate)
      - kubevirt-integration
      - platform-oidc-provider

      # Scale-specific: Additional enterprise features
      - istio-integration
      - netris-integration
      - private-nodes
      - auto-nodes
      - namespace-syncing
      - hybrid-scheduling
      - dns-resolution-advanced
      - coredns-advanced
      - sync-from-host-custom-resources
      - deny-proxy-requests
      - admission-control-policies
      - air-gapped-deployment

  enterprise:
    name: "Enterprise"
    description: "Legacy Enterprise tier (deprecated - use Scale)"
    pricing_url: "https://www.vcluster.com/pricing"
    contact_sales_url: "https://www.vcluster.com/enterprise-demo"
    features:
      # All features (legacy compatibility)
      - virtual-clusters
      - basic-syncing
      - multi-namespace-mode
      - deployed-etcd
      - sqlite-backing-store
      - k8s-distros
      - platform-integration
      - sleep-mode
      - embedded-etcd
      - external-database
      - high-availability
      - fips-mode
      - air-gapped-deployment
      - admission-control-policies
      - private-nodes
      - auto-nodes
      - namespace-syncing
      - custom-resource-syncing
      - hybrid-scheduling
      - cert-manager-integration
      - external-secrets-operator
      - istio-integration
      - kubevirt-integration
      - netris-integration
      - workload-identity
      - dns-resolution-advanced
      - coredns-advanced
      - host-path-mapper
      - sync-from-host-custom-resources
      - deny-proxy-requests
