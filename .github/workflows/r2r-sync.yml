name: Sync docs to R2R vector store

on:
  push:
    branches: [main]
    paths:
      - 'vcluster_versioned_docs/**/*.mdx'
      - 'platform_versioned_docs/**/*.mdx'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no changes)'
        type: boolean
        default: false
      vcluster_version:
        description: 'vCluster version to index'
        type: string
        default: '0.33.0'
      platform_version:
        description: 'Platform version to index'
        type: string
        default: '4.8.0'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Sync docs to R2R
        env:
          R2R_URL: ${{ secrets.R2R_URL }}
        run: |
          if [ -z "$R2R_URL" ]; then
            echo "::error::R2R_URL secret not configured"
            exit 1
          fi

          args="--r2r-url $R2R_URL"
          args="$args --vcluster-version ${{ inputs.vcluster_version || '0.33.0' }}"
          args="$args --platform-version ${{ inputs.platform_version || '4.8.0' }}"

          if [ "${{ inputs.dry_run }}" = "true" ]; then
            args="$args --dry-run"
          fi

          python scripts/r2r-sync.py $args
