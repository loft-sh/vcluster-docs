name: Sync LATEST_VERSIONS

on:
  schedule:
    # Daily at 06:17 UTC. Off-hour offset to avoid the top-of-hour stampede.
    - cron: '17 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync LATEST_VERSIONS to latest stable patch
        id: sync
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/check-latest-versions.js --update

      - name: Open pull request
        if: steps.sync.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SUMMARY: ${{ steps.sync.outputs.summary }}
          VCLUSTER_VERSION: ${{ steps.sync.outputs.vcluster_version }}
          PLATFORM_VERSION: ${{ steps.sync.outputs.platform_version }}
        run: |
          set -eo pipefail

          branch="auto/sync-latest-versions-$(date -u +%Y%m%d)"

          # If a branch already exists for today, the workflow already ran. Skip.
          if git ls-remote --exit-code --heads origin "$branch" >/dev/null 2>&1; then
            echo "Branch $branch already exists; skipping."
            exit 0
          fi

          git config user.name "Loft Bot"
          git config user.email "loft-bot@users.noreply.github.com"
          git checkout -b "$branch"
          git add src/components/InterpolatedCodeBlock/index.js
          git commit -m "chore: sync LATEST_VERSIONS — ${SUMMARY}"
          git push -u origin "$branch"

          gh pr create \
            --base main \
            --head "$branch" \
            --title "chore: sync LATEST_VERSIONS (${SUMMARY})" \
            --body "$(cat <<EOF
          Daily auto-sync of \`LATEST_VERSIONS\` in \`src/components/InterpolatedCodeBlock/index.js\` to the latest stable patch matching the currently-tracked minor version.

          ## Bumps

          ${SUMMARY}

          - vcluster: \`${VCLUSTER_VERSION}\`
          - platform: \`${PLATFORM_VERSION}\`

          ## Guardrails

          - Patch-only — never auto-promotes a minor version (e.g. 0.33.x stays on 0.33).
          - Filters out prereleases (\`prerelease == true\` or tags containing \`-next\`, \`-alpha\`, \`-rc\`, \`-beta\`).
          - New minor versions still go through the normal docs release process.

          Generated by [\`.github/workflows/sync-latest-versions.yml\`](.github/workflows/sync-latest-versions.yml).
          EOF
          )"
