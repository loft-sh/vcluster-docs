name: Validate LATEST_VERSIONS

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'src/components/InterpolatedCodeBlock/index.js'
      - 'scripts/check-latest-versions.js'
      - '.github/workflows/validate-latest-versions.yml'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check LATEST_VERSIONS staleness
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/check-latest-versions.js
