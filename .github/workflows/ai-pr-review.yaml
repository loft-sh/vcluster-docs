name: AI PR review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    uses: loft-sh/github-actions/.github/workflows/ai-pr-review.yaml@main
    with:
      provider: openai
      effort: low
      outcome: pr-comment
      prompt: |
        Find at least one concrete risk or improvement in this change. Do not reply with "No findings." — even trivial-looking changes deserve scrutiny. Keep findings terse.
    secrets:
      openai-api-key: ${{ secrets.OPENAI_API_KEY }}
