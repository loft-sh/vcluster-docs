name: Validate Platform CLI Index

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'vcluster/cli/vcluster_platform*.md'
      - 'platform/_partials/reference/platform-cli-commands.mdx'
      - 'scripts/generate-platform-cli-index.js'

  workflow_dispatch:

jobs:
  validate-platform-cli-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Validate Platform CLI index
        run: npm run validate-platform-cli-index
