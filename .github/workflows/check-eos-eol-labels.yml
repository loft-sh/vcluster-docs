name: Check EOS/EOL labels

# EOS/EOL suffix labels drift purely because time passes — no file edit can
# trigger the check, so this workflow runs on a weekly cron. On drift it opens
# (or updates) a tracking issue with a markdown report of the mismatches.

on:
  schedule:
    # Weekly on Mondays at 09:13 UTC. Off-hour offset to avoid the top-of-hour stampede.
    - cron: '13 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Detect EOS/EOL label drift
        id: check
        run: node scripts/check-eos-eol-labels.js
        continue-on-error: true

      - name: Open or update tracking issue
        if: steps.check.outputs.drift == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eo pipefail

          title="EOS/EOL label drift detected"
          report=$(cat eos-eol-drift-report.md)

          body=$(cat <<EOF
          The scheduled \`check-eos-eol-labels\` workflow detected version labels that no longer match the EOS/EOL dates published in \`docs/_partials/vcluster_supported_versions.mdx\` or \`docs/_partials/platform_supported_versions.mdx\`.

          ${report}

          ---

          Generated by [\`.github/workflows/check-eos-eol-labels.yml\`](.github/workflows/check-eos-eol-labels.yml). Closes when a follow-up PR fixes the labels and the next scheduled run reports no drift.
          EOF
          )

          # Dedupe by exact title match — the same issue is updated on every
          # weekly run that still reports drift, rather than spawning a new one.
          existing=$(gh issue list --state open --json number,title \
            --jq ".[] | select(.title == \"$title\") | .number" | head -1)

          if [ -n "$existing" ]; then
            gh issue edit "$existing" --body "$body"
            echo "Updated existing tracking issue #$existing"
          else
            gh issue create --title "$title" --body "$body"
          fi

      - name: Fail job if drift detected
        if: steps.check.outputs.drift == 'true'
        run: |
          echo "EOS/EOL label drift detected. See the tracking issue opened by the previous step."
          exit 1
