name: Check EOS/EOL labels

# EOS/EOL suffix labels drift purely because time passes — no file edit can
# trigger the check, so this workflow runs on a weekly cron. The script opens
# (or updates by title) a single tracking issue on drift and exits 1 for a red
# badge in the Actions UI.

on:
  schedule:
    # Weekly on Mondays at 09:13 UTC. Off-hour offset to avoid the top-of-hour stampede.
    - cron: '13 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: '20'

      - name: Detect EOS/EOL label drift
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/check-eos-eol-labels.js --open-issue
