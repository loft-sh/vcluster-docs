name: Sync EOS/EOL labels

# EOS/EOL suffix labels drift purely because time passes — no file edit can
# trigger the check, so this workflow runs on a weekly cron. On drift it
# rewrites the labels in place and opens (or force-updates) a single PR for
# review. Fixed branch name so consecutive Mondays update one PR instead of
# accumulating duplicates.

on:
  schedule:
    # Weekly on Mondays at 09:13 UTC. Off-hour offset to avoid the top-of-hour stampede.
    - cron: '13 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2 # zizmor: ignore[artipacked] -- this workflow legitimately pushes auto-sync commits, GITHUB_TOKEN must persist

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: '24'

      - name: Rewrite stale EOS/EOL labels
        id: sync
        run: node scripts/check-eos-eol-labels.js --update

      - name: Open or update pull request
        if: steps.sync.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SUMMARY: ${{ steps.sync.outputs.summary }}
        run: bash scripts/sync-eos-eol-labels-pr.sh
