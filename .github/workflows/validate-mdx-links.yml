name: Validate MDX Link Suffixes

on:
  pull_request:
    branches: [main]
    paths:
      - 'vcluster/**/*.mdx'
      - 'vcluster_versioned_docs/**/*.mdx'
      - 'scripts/find-spa-broken-links.py'

  workflow_dispatch:

jobs:
  validate-mdx-links:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Scan main docs for bare relative links
        run: python3 scripts/find-spa-broken-links.py vcluster

      - name: Scan v0.33.0 docs for bare relative links
        run: python3 scripts/find-spa-broken-links.py vcluster_versioned_docs/version-0.33.0
