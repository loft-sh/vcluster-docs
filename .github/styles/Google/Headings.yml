extends: capitalization
message: "'%s' should use sentence-style capitalization."
link: "https://developers.google.com/style/capitalization#capitalization-in-titles-and-headings"
level: warning
scope: heading
match: $sentence
indicators:
  - ":"
exceptions:
  - Azure
  - API Server
  - Authorization
  - BareMetalHost
  - BareMetalHosts
  - BMC
  - CIS Hardening
  - CLI
  - Cosmos
  - DHCP
  - Docker
  - DNS
  - Emmet
  - gRPC
  - I
  - Kubernetes
  - Linux
  - macOS
  - Marketplace
  - MongoDB
  - OSImage
  - PXE
  - REPL
  - SSH
  - SSHKey
  - Studio
  - TypeScript
  - URLs
  - Visual
  - VS
  - Windows
  - JSON
  - vCluster
  - \bPro\b
  - OpenCost
  - Helm
  - FIPS