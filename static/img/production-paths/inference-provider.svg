<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1197 740" role="img" aria-labelledby="title desc">
  <title id="title">Inference provider architecture</title>
  <desc id="desc">Customers call a product API and inference endpoints through a traffic layer. The provider runs dedicated, isolated tenant environments on private GPU nodes, orchestrated by vCluster Platform on a control plane cluster.</desc>
  <defs>
    <marker id="arrow-orange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#FF6600" />
    </marker>
    <style>
      .label { fill: #050B24; font: 700 14px 'Inter', -apple-system, sans-serif; letter-spacing: .3px; }
      .title { fill: #050B24; font: 700 20px 'Inter', -apple-system, sans-serif; }
      .orange-title { fill: #FF6600; font: 700 18px 'Inter', -apple-system, sans-serif; }
      .small { fill: #828592; font: 15px 'Inter', -apple-system, sans-serif; }
      .tiny { fill: #828592; font: 12px 'Inter', -apple-system, sans-serif; }
      .code { fill: #48B5FF; font: 500 13px 'Roboto Mono', monospace; }
      .box { fill: #fff; stroke: #FF6600; stroke-width: 1.5; }
      .soft-box { fill: #fff; stroke: #B4B6BD; stroke-width: 1.5; }
      .route-box { fill: #FFE0CC; stroke: #FF6600; stroke-width: 1.5; }
      .chip { fill: #FFE0CC; stroke: #FFC199; stroke-width: 1; }
      .orange-bar { fill: #FF6600; }
      .dark-bar { fill: #050B24; }
      .bar-text { fill: #fff; font: 700 16px 'Inter', -apple-system, sans-serif; }
      .arrow-orange { stroke: #FF6600; stroke-width: 2; fill: none; marker-end: url(#arrow-orange); }
    </style>
  </defs>

  <rect fill="#EDEFF3" x="4" y="8" width="1189" height="724" rx="22" />
  <text class="label" x="36" y="52">Inference provider service — customer API boundary</text>

  <g>
    <rect class="soft-box" x="48" y="82" width="210" height="82" rx="14" />
    <text class="orange-title" x="153" y="116" text-anchor="middle">Customer Apps</text>
    <text class="small" x="153" y="140" text-anchor="middle">SDKs, API clients, UI</text>
  </g>

  <g>
    <rect class="box" x="332" y="76" width="248" height="94" rx="14" />
    <text class="title" x="456" y="112" text-anchor="middle">Product API</text>
    <text class="small" x="456" y="138" text-anchor="middle">Create, scale, update, delete</text>
  </g>

  <g>
    <rect class="box" x="654" y="76" width="248" height="94" rx="14" />
    <text class="title" x="778" y="112" text-anchor="middle">Traffic Layer</text>
    <text class="small" x="778" y="138" text-anchor="middle">Auth, routing, rate limits</text>
  </g>

  <g>
    <rect class="soft-box" x="972" y="82" width="176" height="82" rx="14" />
    <text class="orange-title" x="1060" y="116" text-anchor="middle">Endpoint</text>
    <text class="code" x="1060" y="140" text-anchor="middle">/v1/chat, /v1/models</text>
  </g>

  <path class="arrow-orange" d="M258 123 H322" />
  <path class="arrow-orange" d="M580 123 H644" />
  <path class="arrow-orange" d="M902 123 H962" />

  <text class="label" x="36" y="205">Operator environment — hidden from customers</text>

  <path class="arrow-orange" d="M778 170 V235 H598 V265" />

  <g>
    <rect class="route-box" x="476" y="265" width="244" height="44" rx="8" />
    <text class="small" x="598" y="291" text-anchor="middle" fill="#CC5100">Dedicated tenant environments</text>
  </g>

  <path class="arrow-orange" d="M598 309 V355 H322 V385" />
  <path class="arrow-orange" d="M598 309 V355 H874 V385" />

  <g>
    <rect class="box" x="142" y="385" width="360" height="190" rx="16" />
    <text class="orange-title" x="322" y="417" text-anchor="middle">Dedicated Customer A</text>
    <text class="title" x="322" y="444" text-anchor="middle">Tenant Cluster</text>
    <rect class="chip" x="170" y="464" width="304" height="38" rx="5" />
    <text class="title" x="322" y="489" text-anchor="middle">Model Runtime Template</text>
    <text class="small" x="322" y="521" text-anchor="middle">vLLM / Triton / KServe</text>
    <rect class="soft-box" x="229" y="528" width="186" height="42" rx="9" />
    <text class="small" x="322" y="554" text-anchor="middle">Private GPU Nodes</text>
  </g>

  <g>
    <rect class="box" x="694" y="385" width="360" height="190" rx="16" />
    <text class="orange-title" x="874" y="417" text-anchor="middle">Dedicated Customer B</text>
    <text class="title" x="874" y="444" text-anchor="middle">Tenant Cluster</text>
    <rect class="chip" x="722" y="464" width="304" height="38" rx="5" />
    <text class="title" x="874" y="489" text-anchor="middle">Model Runtime Template</text>
    <text class="small" x="874" y="521" text-anchor="middle">Model cache, secrets, metrics</text>
    <rect class="soft-box" x="781" y="528" width="186" height="42" rx="9" />
    <text class="small" x="874" y="554" text-anchor="middle">Private GPU Nodes</text>
  </g>

  <g>
    <rect class="orange-bar" x="49" y="608" width="1097" height="45" rx="6" />
    <text class="bar-text" x="598" y="636" text-anchor="middle">vCluster Platform</text>
  </g>

  <g>
    <rect class="dark-bar" x="49" y="659" width="1097" height="45" rx="6" />
    <text class="bar-text" x="598" y="687" text-anchor="middle">Control Plane Cluster — EKS, AKS, GKE, cloud VMs, or vCluster Standalone</text>
  </g>

  <text class="tiny" x="73" y="597">Templates, quotas, node types, access keys, and endpoint lifecycle</text>
  <text class="tiny" x="654" y="597">GPU capacity from cloud instances, Auto Nodes, joined nodes, or vMetal</text>
</svg>
