<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1197 590" role="img" aria-labelledby="title desc">
  <title id="title">Inference provider architecture</title>
  <desc id="desc">Customers call a product API and inference endpoints. The provider product uses vCluster Platform to manage isolated inference environments backed by GPU capacity.</desc>
  <defs>
    <marker id="arrow-orange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#ff5a00" />
    </marker>
    <marker id="arrow-dark" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#071026" />
    </marker>
    <style>
      .bg { fill: #f5f5f6; }
      .label { fill: #3f4b5f; font: 15px Arial, sans-serif; letter-spacing: .2px; }
      .title { fill: #071026; font: 700 20px Arial, sans-serif; }
      .orange-title { fill: #ff5a00; font: 700 18px Arial, sans-serif; }
      .small { fill: #566173; font: 13px Arial, sans-serif; }
      .tiny { fill: #6d7280; font: 12px Arial, sans-serif; }
      .box { fill: #fff; stroke: #ff5a00; stroke-width: 1.5; }
      .soft-box { fill: #fff; stroke: #a3a3a3; stroke-width: 1.5; }
      .dashed { fill: #fff7ef; stroke: #ff5a00; stroke-width: 1.5; stroke-dasharray: 4 6; }
      .chip { fill: #c8c8c8; }
      .orange-bar { fill: #ff5a00; }
      .dark-bar { fill: #071026; }
      .bar-text { fill: #fff; font: 700 16px Arial, sans-serif; }
      .arrow-orange { stroke: #ff5a00; stroke-width: 2; fill: none; marker-end: url(#arrow-orange); }
      .arrow-dark { stroke: #071026; stroke-width: 2; fill: none; marker-end: url(#arrow-dark); }
    </style>
  </defs>

  <rect class="bg" x="4" y="8" width="1189" height="574" rx="22" />
  <text class="label" x="36" y="52">INFERENCE PROVIDER SERVICE - CUSTOMER API BOUNDARY</text>

  <g>
    <rect class="soft-box" x="48" y="82" width="210" height="82" rx="14" />
    <text class="orange-title" x="153" y="116" text-anchor="middle">Customer Apps</text>
    <text class="small" x="153" y="140" text-anchor="middle">SDKs, API clients, UI</text>
  </g>

  <g>
    <rect class="box" x="332" y="76" width="248" height="94" rx="14" />
    <text class="title" x="456" y="112" text-anchor="middle">Product API</text>
    <text class="small" x="456" y="138" text-anchor="middle">create, scale, update, delete</text>
  </g>

  <g>
    <rect class="box" x="654" y="76" width="248" height="94" rx="14" />
    <text class="title" x="778" y="112" text-anchor="middle">Traffic Layer</text>
    <text class="small" x="778" y="138" text-anchor="middle">auth, routing, rate limits</text>
  </g>

  <g>
    <rect class="soft-box" x="972" y="82" width="176" height="82" rx="14" />
    <text class="orange-title" x="1060" y="116" text-anchor="middle">Endpoint</text>
    <text class="small" x="1060" y="140" text-anchor="middle">/v1/chat, /v1/models</text>
  </g>

  <path class="arrow-orange" d="M258 123 H322" />
  <path class="arrow-orange" d="M580 123 H644" />
  <path class="arrow-orange" d="M902 123 H962" />
  <path class="arrow-dark" d="M456 170 V194 H24 V480 H49" />

  <text class="label" x="36" y="224">OPERATOR ENVIRONMENT - HIDDEN FROM CUSTOMERS</text>

  <g>
    <rect class="box" x="49" y="250" width="330" height="178" rx="16" />
    <text class="orange-title" x="214" y="282" text-anchor="middle">Endpoint Tier A</text>
    <text class="title" x="214" y="309" text-anchor="middle">Tenant Cluster</text>
    <rect class="chip" x="75" y="329" width="278" height="38" rx="5" />
    <text class="title" x="214" y="354" text-anchor="middle">Model Runtime Template</text>
    <text class="small" x="214" y="386" text-anchor="middle">vLLM / Triton / KServe</text>
    <rect class="soft-box" x="156" y="398" width="116" height="34" rx="9" />
    <text class="small" x="214" y="420" text-anchor="middle">GPU Nodes</text>
  </g>

  <g>
    <rect class="box" x="434" y="250" width="330" height="178" rx="16" />
    <text class="orange-title" x="599" y="282" text-anchor="middle">Endpoint Tier B</text>
    <text class="title" x="599" y="309" text-anchor="middle">Tenant Cluster</text>
    <rect class="chip" x="460" y="329" width="278" height="38" rx="5" />
    <text class="title" x="599" y="354" text-anchor="middle">Model Runtime Template</text>
    <text class="small" x="599" y="386" text-anchor="middle">model cache, secrets, metrics</text>
    <rect class="soft-box" x="541" y="398" width="116" height="34" rx="9" />
    <text class="small" x="599" y="420" text-anchor="middle">GPU Nodes</text>
  </g>

  <g>
    <rect class="dashed" x="819" y="250" width="330" height="178" rx="16" />
    <text class="orange-title" x="984" y="282" text-anchor="middle">Shared Serving Pool</text>
    <text class="title" x="984" y="309" text-anchor="middle">Optional</text>
    <rect class="chip" x="845" y="329" width="278" height="38" rx="5" />
    <text class="title" x="984" y="354" text-anchor="middle">Provider Models</text>
    <text class="small" x="984" y="386" text-anchor="middle">trusted workloads</text>
    <rect class="soft-box" x="926" y="398" width="116" height="34" rx="9" />
    <text class="small" x="984" y="420" text-anchor="middle">GPU Pool</text>
  </g>

  <path class="arrow-orange" d="M778 170 V236" />
  <path class="arrow-orange" d="M778 236 H214 V250" />
  <path class="arrow-orange" d="M778 236 H599 V250" />
  <path class="arrow-orange" d="M778 236 H984 V250" />

  <g>
    <rect class="orange-bar" x="49" y="458" width="1097" height="45" rx="6" />
    <text class="bar-text" x="598" y="486" text-anchor="middle">vCluster Platform</text>
    <text class="bar-text" x="80" y="486">V</text>
  </g>

  <g>
    <rect class="dark-bar" x="49" y="509" width="1097" height="45" rx="6" />
    <text class="bar-text" x="598" y="537" text-anchor="middle">Control Plane Cluster - EKS, AKS, GKE, cloud VMs, or vCluster Standalone</text>
  </g>

  <text class="tiny" x="73" y="447">templates, quotas, allowed node types, access keys, endpoint lifecycle</text>
  <text class="tiny" x="690" y="447">GPU capacity from cloud instances, Auto Nodes, manually joined nodes, or vMetal</text>
</svg>
