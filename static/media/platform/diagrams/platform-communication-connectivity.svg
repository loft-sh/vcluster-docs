<svg viewBox="0 0 1000 430" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Platform agent outbound connectivity, proxy requests, DERP fallback, and DNS lookup">
  <defs>
    <marker id="platform-communication-arrow" viewBox="0 0 10 7" markerWidth="8" markerHeight="6" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#828592"/>
    </marker>
    <marker id="platform-communication-orange-arrow" viewBox="0 0 10 7" markerWidth="8" markerHeight="6" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#FF6600"/>
    </marker>
    <style>
      text { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { font-size: 14px; font-weight: 600; fill: #050B24; }
      .heading { font-size: 15px; font-weight: 700; fill: #050B24; }
      .small { font-size: 12px; fill: #505466; }
      .caption { font-size: 12px; font-weight: 500; fill: #828592; }
    </style>
  </defs>

  <rect width="1000" height="430" rx="18" fill="#FFFFFF"/>

  <rect x="40" y="180" width="160" height="74" rx="9" fill="#FFF8F3" stroke="#FF6600" stroke-width="1.5"/>
  <text x="120" y="209" text-anchor="middle" class="label">User or automation</text>
  <text x="120" y="231" text-anchor="middle" class="small">kubectl, UI, CLI</text>

  <rect x="310" y="60" width="270" height="300" rx="16" fill="#F8FBFF" stroke="#6B88A6" stroke-width="1.2"/>
  <text x="445" y="92" text-anchor="middle" class="heading">vCluster Platform</text>
  <text x="445" y="114" text-anchor="middle" class="caption">Public URL or in-cluster service</text>

  <rect x="335" y="142" width="105" height="54" rx="8" fill="#FFFFFF" stroke="#B4B6BD" stroke-width="1.2"/>
  <text x="387.5" y="165" text-anchor="middle" class="label">Gateway</text>
  <text x="387.5" y="184" text-anchor="middle" class="small">Proxy and auth</text>

  <rect x="465" y="142" width="90" height="54" rx="8" fill="#FFFFFF" stroke="#B4B6BD" stroke-width="1.2"/>
  <text x="510" y="165" text-anchor="middle" class="label">API</text>
  <text x="510" y="184" text-anchor="middle" class="small">Resources</text>

  <rect x="335" y="238" width="105" height="54" rx="8" fill="#FFFFFF" stroke="#B4B6BD" stroke-width="1.2"/>
  <text x="387.5" y="261" text-anchor="middle" class="label">Controllers</text>
  <text x="387.5" y="280" text-anchor="middle" class="small">Reconcile</text>

  <rect x="465" y="238" width="90" height="54" rx="8" fill="#FFF8F3" stroke="#FF6600" stroke-width="1.5"/>
  <text x="510" y="261" text-anchor="middle" class="label">DERP</text>
  <text x="510" y="280" text-anchor="middle" class="small">Relay</text>

  <rect x="710" y="70" width="245" height="250" rx="16" fill="#FFFFFF" stroke="#B4B6BD" stroke-width="1.2"/>
  <text x="832.5" y="101" text-anchor="middle" class="heading">Connected cluster</text>
  <text x="832.5" y="123" text-anchor="middle" class="caption">No inbound access required by default</text>

  <rect x="785" y="145" width="95" height="54" rx="8" fill="#FFF8F3" stroke="#FF6600" stroke-width="1.5"/>
  <text x="832.5" y="168" text-anchor="middle" class="label">Agent</text>
  <text x="832.5" y="187" text-anchor="middle" class="small">Outbound</text>

  <rect x="850" y="238" width="85" height="54" rx="8" fill="#F3F5F9" stroke="#B4B6BD" stroke-width="1"/>
  <text x="892.5" y="261" text-anchor="middle" class="label">Cluster</text>
  <text x="892.5" y="280" text-anchor="middle" class="small">API</text>

  <rect x="735" y="238" width="95" height="54" rx="8" fill="#F3F5F9" stroke="#B4B6BD" stroke-width="1"/>
  <text x="782.5" y="261" text-anchor="middle" class="label">Tenant</text>
  <text x="782.5" y="280" text-anchor="middle" class="small">APIs</text>

  <rect x="747.5" y="355" width="170" height="44" rx="22" fill="#F3F5F9" stroke="#B4B6BD" stroke-width="1"/>
  <text x="832.5" y="382" text-anchor="middle" class="small">DNS resolver</text>

  <path d="M200 207 H310" stroke="#828592" stroke-width="1.5" marker-end="url(#platform-communication-arrow)"/>
  <text x="255" y="193" text-anchor="middle" class="caption">Platform proxy</text>

  <path d="M440 169 H465" stroke="#828592" stroke-width="1.4" marker-end="url(#platform-communication-arrow)"/>
  <path d="M440 265 H465" stroke="#828592" stroke-width="1.4" marker-end="url(#platform-communication-arrow)"/>

  <path d="M785 172 H580" stroke="#FF6600" stroke-width="1.7" marker-end="url(#platform-communication-orange-arrow)"/>
  <text x="645" y="151" text-anchor="middle" class="caption">outbound HTTPS</text>
  <text x="645" y="166" text-anchor="middle" class="caption">TCP 443</text>

  <path d="M580 232 H720 V186 H785" fill="none" stroke="#828592" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#platform-communication-arrow)"/>
  <text x="645" y="218" text-anchor="middle" class="caption">Tailscale path</text>

  <path d="M555 265 H735" fill="none" stroke="#828592" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#platform-communication-arrow)"/>
  <text x="645" y="286" text-anchor="middle" class="caption">DERP fallback</text>

  <path d="M848 199 V218 H892 V238" fill="none" stroke="#828592" stroke-width="1.4" marker-end="url(#platform-communication-arrow)"/>
  <path d="M817 199 V218 H783 V238" fill="none" stroke="#828592" stroke-width="1.4" marker-end="url(#platform-communication-arrow)"/>

  <path d="M880 172 H975 V377 H917.5" fill="none" stroke="#828592" stroke-width="1.4" marker-end="url(#platform-communication-arrow)"/>
  <text x="956" y="396" text-anchor="middle" class="caption">DNS lookup</text>
</svg>
