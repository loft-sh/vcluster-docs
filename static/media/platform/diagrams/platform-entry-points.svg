<svg viewBox="0 0 1000 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Platform API gateway routing requests to management, connected cluster, and tenant cluster APIs">
  <defs>
    <marker id="platform-entry-arrow" viewBox="0 0 10 7" markerWidth="8" markerHeight="6" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#828592"/>
    </marker>
    <style>
      text { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { font-size: 14px; font-weight: 600; fill: #050B24; }
      .small { font-size: 12px; fill: #505466; }
      .caption { font-size: 12px; font-weight: 500; fill: #828592; }
    </style>
  </defs>

  <rect width="1000" height="420" rx="18" fill="#FFFFFF"/>

  <rect x="35" y="70" width="170" height="58" rx="8" fill="#FFF8F3" stroke="#FF6600" stroke-width="1.5"/>
  <text x="120" y="96" text-anchor="middle" class="label">Web UI</text>
  <text x="120" y="115" text-anchor="middle" class="small">Browser</text>

  <rect x="35" y="181" width="170" height="58" rx="8" fill="#FFF8F3" stroke="#FF6600" stroke-width="1.5"/>
  <text x="120" y="207" text-anchor="middle" class="label">CLI</text>
  <text x="120" y="226" text-anchor="middle" class="small">Operators</text>

  <rect x="35" y="292" width="170" height="58" rx="8" fill="#FFF8F3" stroke="#FF6600" stroke-width="1.5"/>
  <text x="120" y="318" text-anchor="middle" class="label">Automation</text>
  <text x="120" y="337" text-anchor="middle" class="small">Integrations</text>

  <rect x="390" y="112" width="220" height="224" rx="16" fill="#F8FBFF" stroke="#6B88A6" stroke-width="1.2"/>
  <text x="500" y="145" text-anchor="middle" font-size="16" font-weight="700" fill="#050B24">API gateway</text>
  <rect x="422" y="174" width="156" height="36" rx="6" fill="#FFFFFF" stroke="#B4B6BD" stroke-width="1"/>
  <text x="500" y="197" text-anchor="middle" class="small">Authenticate</text>
  <rect x="422" y="224" width="156" height="36" rx="6" fill="#FFFFFF" stroke="#B4B6BD" stroke-width="1"/>
  <text x="500" y="247" text-anchor="middle" class="small">Check access</text>
  <rect x="422" y="274" width="156" height="36" rx="6" fill="#FFFFFF" stroke="#B4B6BD" stroke-width="1"/>
  <text x="500" y="297" text-anchor="middle" class="small">Impersonate</text>

  <rect x="790" y="55" width="170" height="70" rx="9" fill="#FFFFFF" stroke="#B4B6BD" stroke-width="1.2"/>
  <text x="875" y="85" text-anchor="middle" class="label">Management API</text>
  <text x="875" y="106" text-anchor="middle" class="small">Platform resources</text>

  <rect x="790" y="175" width="170" height="70" rx="9" fill="#FFFFFF" stroke="#B4B6BD" stroke-width="1.2"/>
  <text x="875" y="205" text-anchor="middle" class="label">Connected cluster API</text>
  <text x="875" y="226" text-anchor="middle" class="small">Cluster-scoped requests</text>

  <rect x="790" y="295" width="170" height="70" rx="9" fill="#FFFFFF" stroke="#B4B6BD" stroke-width="1.2"/>
  <text x="875" y="325" text-anchor="middle" class="label">Tenant cluster API</text>
  <text x="875" y="346" text-anchor="middle" class="small">Project-scoped requests</text>

  <line x1="205" y1="99" x2="390" y2="174" stroke="#828592" stroke-width="1.5" marker-end="url(#platform-entry-arrow)"/>
  <line x1="205" y1="210" x2="390" y2="210" stroke="#828592" stroke-width="1.5" marker-end="url(#platform-entry-arrow)"/>
  <line x1="205" y1="321" x2="390" y2="246" stroke="#828592" stroke-width="1.5" marker-end="url(#platform-entry-arrow)"/>

  <line x1="610" y1="170" x2="790" y2="90" stroke="#828592" stroke-width="1.5" marker-end="url(#platform-entry-arrow)"/>
  <line x1="610" y1="210" x2="790" y2="210" stroke="#828592" stroke-width="1.5" marker-end="url(#platform-entry-arrow)"/>
  <line x1="610" y1="250" x2="790" y2="330" stroke="#828592" stroke-width="1.5" marker-end="url(#platform-entry-arrow)"/>

  <text x="300" y="198" text-anchor="middle" class="caption">request</text>
  <text x="700" y="198" text-anchor="middle" class="caption">forwarded request</text>
</svg>
