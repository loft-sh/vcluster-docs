<svg viewBox="0 0 1000 310" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Tenant resource lifecycle from request through policy, reconciliation, vCluster runtime, and status">
  <defs>
    <marker id="platform-lifecycle-arrow" viewBox="0 0 10 7" markerWidth="8" markerHeight="6" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#828592"/>
    </marker>
    <style>
      text { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { font-size: 13px; font-weight: 600; fill: #050B24; }
      .small { font-size: 11px; fill: #505466; }
      .caption { font-size: 11px; font-weight: 500; fill: #828592; }
    </style>
  </defs>

  <rect width="1000" height="310" rx="18" fill="#FFFFFF"/>

  <rect x="35" y="112" width="120" height="72" rx="9" fill="#FFF8F3" stroke="#FF6600" stroke-width="1.5"/>
  <text x="95" y="141" text-anchor="middle" class="label">Request</text>
  <text x="95" y="162" text-anchor="middle" class="small">User or GitOps</text>

  <rect x="215" y="112" width="120" height="72" rx="9" fill="#FFFFFF" stroke="#B4B6BD" stroke-width="1.2"/>
  <text x="275" y="141" text-anchor="middle" class="label">API resource</text>
  <text x="275" y="162" text-anchor="middle" class="small">Desired state</text>

  <rect x="395" y="112" width="120" height="72" rx="9" fill="#FFFFFF" stroke="#B4B6BD" stroke-width="1.2"/>
  <text x="455" y="141" text-anchor="middle" class="label">Policy check</text>
  <text x="455" y="162" text-anchor="middle" class="small">Project rules</text>

  <rect x="575" y="112" width="120" height="72" rx="9" fill="#F8FBFF" stroke="#6B88A6" stroke-width="1.2"/>
  <text x="635" y="141" text-anchor="middle" class="label">Reconcile</text>
  <text x="635" y="162" text-anchor="middle" class="small">Platform</text>

  <rect x="745" y="64" width="190" height="168" rx="16" fill="#FFF8F3" stroke="#FF6600" stroke-width="1.5"/>
  <text x="840" y="96" text-anchor="middle" font-size="15" font-weight="700" fill="#050B24">Connected cluster</text>
  <rect x="775" y="120" width="130" height="38" rx="6" fill="#FFFFFF" stroke="#B4B6BD" stroke-width="1"/>
  <text x="840" y="144" text-anchor="middle" class="small">Platform agent</text>
  <rect x="775" y="174" width="130" height="38" rx="6" fill="#FFFFFF" stroke="#B4B6BD" stroke-width="1"/>
  <text x="840" y="198" text-anchor="middle" class="small">vCluster runtime</text>

  <path d="M155 148 H215" stroke="#828592" stroke-width="1.5" marker-end="url(#platform-lifecycle-arrow)"/>
  <path d="M335 148 H395" stroke="#828592" stroke-width="1.5" marker-end="url(#platform-lifecycle-arrow)"/>
  <path d="M515 148 H575" stroke="#828592" stroke-width="1.5" marker-end="url(#platform-lifecycle-arrow)"/>
  <path d="M695 148 H775" stroke="#828592" stroke-width="1.5" marker-end="url(#platform-lifecycle-arrow)"/>

  <path d="M840 232 C840 274 275 274 275 184" fill="none" stroke="#828592" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#platform-lifecycle-arrow)"/>
  <text x="555" y="270" text-anchor="middle" class="caption">status returns to the Platform API resource</text>

  <text x="185" y="135" text-anchor="middle" class="caption">create</text>
  <text x="365" y="135" text-anchor="middle" class="caption">validate</text>
  <text x="720" y="135" text-anchor="middle" class="caption">apply</text>
</svg>
