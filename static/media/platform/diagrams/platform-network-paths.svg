<svg viewBox="0 0 1000 430" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Network paths for direct endpoint, Platform proxy, and Tailscale connectivity">
  <defs>
    <marker id="platform-network-arrow" viewBox="0 0 10 7" markerWidth="8" markerHeight="6" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#828592"/>
    </marker>
    <marker id="platform-network-orange-arrow" viewBox="0 0 10 7" markerWidth="8" markerHeight="6" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#FF6600"/>
    </marker>
    <style>
      text { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { font-size: 14px; font-weight: 600; fill: #050B24; }
      .small { font-size: 12px; fill: #505466; }
      .caption { font-size: 12px; font-weight: 500; fill: #828592; }
    </style>
  </defs>

  <rect width="1000" height="430" rx="18" fill="#FFFFFF"/>

  <rect x="50" y="178" width="170" height="74" rx="9" fill="#FFF8F3" stroke="#FF6600" stroke-width="1.5"/>
  <text x="135" y="207" text-anchor="middle" class="label">User or automation</text>
  <text x="135" y="229" text-anchor="middle" class="small">kubectl, UI, CLI</text>

  <rect x="360" y="58" width="190" height="74" rx="9" fill="#F8FBFF" stroke="#6B88A6" stroke-width="1.2"/>
  <text x="455" y="87" text-anchor="middle" class="label">Platform gateway</text>
  <text x="455" y="109" text-anchor="middle" class="small">Proxy and audit</text>

  <rect x="705" y="68" width="205" height="74" rx="9" fill="#FFFFFF" stroke="#B4B6BD" stroke-width="1.2"/>
  <text x="807.5" y="97" text-anchor="middle" class="label">Connected cluster API</text>
  <text x="807.5" y="119" text-anchor="middle" class="small">Cluster proxy target</text>

  <rect x="705" y="290" width="205" height="74" rx="9" fill="#FFF8F3" stroke="#FF6600" stroke-width="1.5"/>
  <text x="807.5" y="319" text-anchor="middle" class="label">Tenant cluster API</text>
  <text x="807.5" y="341" text-anchor="middle" class="small">Direct or proxied</text>

  <rect x="360" y="290" width="190" height="74" rx="9" fill="#FFFFFF" stroke="#B4B6BD" stroke-width="1.2"/>
  <text x="455" y="319" text-anchor="middle" class="label">Platform or agent peer</text>
  <text x="455" y="341" text-anchor="middle" class="small">Tailscale path</text>

  <rect x="545" y="190" width="146" height="54" rx="27" fill="#F3F5F9" stroke="#B4B6BD" stroke-width="1"/>
  <text x="618" y="222" text-anchor="middle" class="label">DERP relay</text>

  <path d="M220 237 H300 V392 H807 V364" fill="none" stroke="#FF6600" stroke-width="1.6" marker-end="url(#platform-network-orange-arrow)"/>
  <text x="555" y="410" text-anchor="middle" class="caption">direct endpoint</text>

  <path d="M220 194 H300 V95 H360" fill="none" stroke="#828592" stroke-width="1.5" marker-end="url(#platform-network-arrow)"/>
  <text x="300" y="80" text-anchor="middle" class="caption">Platform proxy</text>
  <path d="M550 95 H705" stroke="#828592" stroke-width="1.5" marker-end="url(#platform-network-arrow)"/>
  <path d="M550 125 H640 V165 H955 V327 H910" fill="none" stroke="#828592" stroke-width="1.5" marker-end="url(#platform-network-arrow)"/>
  <text x="910" y="184" text-anchor="middle" class="caption">tenant proxy</text>

  <path d="M550 327 H705" stroke="#828592" stroke-width="1.5" marker-end="url(#platform-network-arrow)"/>

  <path d="M455 132 V290" stroke="#828592" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#platform-network-arrow)"/>
  <text x="408" y="218" text-anchor="middle" class="caption">Tailscale path</text>
  <path d="M550 310 H618 V244" fill="none" stroke="#828592" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#platform-network-arrow)"/>
  <path d="M691 217 H807 V290" fill="none" stroke="#828592" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#platform-network-arrow)"/>
  <text x="765" y="202" text-anchor="middle" class="caption">relay fallback</text>
</svg>
