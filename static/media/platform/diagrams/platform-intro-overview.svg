<svg viewBox="0 0 1000 340" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="vCluster Platform connects admins and automation to projects, policies, connected clusters, and tenant clusters">
  <defs>
    <marker id="platform-intro-arrow" viewBox="0 0 10 7" markerWidth="8" markerHeight="6" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#828592"/>
    </marker>
    <style>
      text { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { font-size: 15px; font-weight: 700; fill: #050B24; }
      .small { font-size: 12px; fill: #505466; }
      .caption { font-size: 12px; font-weight: 500; fill: #828592; }
    </style>
  </defs>

  <rect width="1000" height="340" rx="18" fill="#FFFFFF"/>

  <rect x="30" y="125" width="200" height="90" rx="10" fill="#FFF8F3" stroke="#FF6600" stroke-width="1.5"/>
  <text x="130" y="162" text-anchor="middle" class="label">Admins and automation</text>
  <text x="130" y="186" text-anchor="middle" class="small">UI, CLI, API, GitOps</text>

  <rect x="290" y="80" width="220" height="180" rx="16" fill="#F8FBFF" stroke="#6B88A6" stroke-width="1.2"/>
  <text x="400" y="114" text-anchor="middle" font-size="17" font-weight="700" fill="#050B24">vCluster Platform</text>
  <text x="400" y="138" text-anchor="middle" class="small">Management plane</text>
  <rect x="325" y="165" width="150" height="34" rx="6" fill="#FFFFFF" stroke="#B4B6BD" stroke-width="1"/>
  <text x="400" y="187" text-anchor="middle" class="small">Projects and access</text>
  <rect x="325" y="212" width="150" height="34" rx="6" fill="#FFFFFF" stroke="#B4B6BD" stroke-width="1"/>
  <text x="400" y="234" text-anchor="middle" class="small">Templates and policies</text>

  <rect x="590" y="65" width="165" height="80" rx="10" fill="#FFFFFF" stroke="#B4B6BD" stroke-width="1.2"/>
  <text x="672.5" y="96" text-anchor="middle" class="label">Connected cluster</text>
  <text x="672.5" y="119" text-anchor="middle" class="small">Workloads run here</text>

  <rect x="590" y="195" width="165" height="80" rx="10" fill="#FFFFFF" stroke="#B4B6BD" stroke-width="1.2"/>
  <text x="672.5" y="226" text-anchor="middle" class="label">Connected cluster</text>
  <text x="672.5" y="249" text-anchor="middle" class="small">Workloads run here</text>

  <rect x="827" y="73" width="145" height="60" rx="9" fill="#FFF8F3" stroke="#FFB380" stroke-width="1"/>
  <rect x="821" y="79" width="145" height="60" rx="9" fill="#FFF8F3" stroke="#FF8A3D" stroke-width="1"/>
  <rect x="815" y="85" width="145" height="60" rx="9" fill="#FFF8F3" stroke="#FF6600" stroke-width="1.5"/>
  <text x="887.5" y="110" text-anchor="middle" class="label">Tenant clusters</text>
  <text x="887.5" y="130" text-anchor="middle" class="small">vCluster runtime</text>

  <rect x="827" y="203" width="145" height="60" rx="9" fill="#FFF8F3" stroke="#FFB380" stroke-width="1"/>
  <rect x="821" y="209" width="145" height="60" rx="9" fill="#FFF8F3" stroke="#FF8A3D" stroke-width="1"/>
  <rect x="815" y="215" width="145" height="60" rx="9" fill="#FFF8F3" stroke="#FF6600" stroke-width="1.5"/>
  <text x="887.5" y="240" text-anchor="middle" class="label">Tenant clusters</text>
  <text x="887.5" y="260" text-anchor="middle" class="small">vCluster runtime</text>

  <line x1="230" y1="170" x2="290" y2="170" stroke="#828592" stroke-width="1.6" marker-end="url(#platform-intro-arrow)"/>
  <text x="260" y="138" text-anchor="middle" class="caption">intent</text>

  <path d="M510 140 H560 V105 H590" fill="none" stroke="#828592" stroke-width="1.6" marker-end="url(#platform-intro-arrow)"/>
  <path d="M510 200 H560 V235 H590" fill="none" stroke="#828592" stroke-width="1.6" marker-end="url(#platform-intro-arrow)"/>
  <text x="550" y="178" text-anchor="middle" class="caption">reconcile</text>

  <line x1="755" y1="105" x2="815" y2="115" stroke="#828592" stroke-width="1.6" marker-end="url(#platform-intro-arrow)"/>
  <line x1="755" y1="235" x2="815" y2="245" stroke="#828592" stroke-width="1.6" marker-end="url(#platform-intro-arrow)"/>
</svg>
