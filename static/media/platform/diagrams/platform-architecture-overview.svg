<svg viewBox="0 0 1000 460" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="vCluster Platform management plane connected to two connected clusters">
  <defs>
    <marker id="platform-overview-arrow" viewBox="0 0 10 7" markerWidth="8" markerHeight="6" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#828592"/>
    </marker>
    <style>
      text { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { font-size: 14px; font-weight: 600; fill: #050B24; }
      .small { font-size: 12px; fill: #505466; }
      .caption { font-size: 12px; font-weight: 500; fill: #828592; }
    </style>
  </defs>

  <rect width="1000" height="460" rx="18" fill="#FFFFFF"/>

  <rect x="40" y="185" width="170" height="90" rx="10" fill="#FFF8F3" stroke="#FF6600" stroke-width="1.5"/>
  <text x="125" y="222" text-anchor="middle" class="label">Users</text>
  <text x="125" y="245" text-anchor="middle" class="small">UI, CLI, API</text>

  <rect x="280" y="50" width="310" height="360" rx="16" fill="#F8FBFF" stroke="#6B88A6" stroke-width="1.2"/>
