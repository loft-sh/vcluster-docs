  <text x="435" y="104" text-anchor="middle" class="caption">Management plane</text>

  <rect x="315" y="130" width="105" height="58" rx="8" fill="#FFFFFF" stroke="#B4B6BD" stroke-width="1.2"/>
  <text x="367.5" y="154" text-anchor="middle" class="label">Web UI</text>
  <text x="367.5" y="173" text-anchor="middle" class="small">Browser</text>

  <rect x="450" y="130" width="105" height="58" rx="8" fill="#FFFFFF" stroke="#B4B6BD" stroke-width="1.2"/>
  <text x="502.5" y="154" text-anchor="middle" class="label">Gateway</text>
  <text x="502.5" y="173" text-anchor="middle" class="small">Auth</text>

  <rect x="315" y="225" width="105" height="58" rx="8" fill="#FFFFFF" stroke="#B4B6BD" stroke-width="1.2"/>
  <text x="367.5" y="249" text-anchor="middle" class="label">API</text>
  <text x="367.5" y="268" text-anchor="middle" class="small">Resources</text>

