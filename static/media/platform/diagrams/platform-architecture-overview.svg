  <line x1="420" y1="159" x2="450" y2="159" stroke="#828592" stroke-width="1.4" marker-end="url(#platform-overview-arrow)"/>
  <line x1="502" y1="188" x2="385" y2="225" stroke="#828592" stroke-width="1.4" marker-end="url(#platform-overview-arrow)"/>
  <line x1="420" y1="254" x2="450" y2="254" stroke="#828592" stroke-width="1.4" marker-end="url(#platform-overview-arrow)"/>
  <line x1="368" y1="283" x2="395" y2="320" stroke="#828592" stroke-width="1.4" marker-end="url(#platform-overview-arrow)"/>
  <line x1="503" y1="283" x2="475" y2="320" stroke="#828592" stroke-width="1.4" marker-end="url(#platform-overview-arrow)"/>
  <line x1="590" y1="160" x2="680" y2="135" stroke="#828592" stroke-width="1.6" marker-end="url(#platform-overview-arrow)"/>
  <line x1="590" y1="300" x2="680" y2="330" stroke="#828592" stroke-width="1.6" marker-end="url(#platform-overview-arrow)"/>
  <text x="635" y="128" text-anchor="middle" class="caption">reconcile</text>
  <text x="635" y="348" text-anchor="middle" class="caption">reconcile</text>
