  <rect x="680" y="55" width="270" height="160" rx="16" fill="#FFFFFF" stroke="#B4B6BD" stroke-width="1.2"/>
  <text x="815" y="84" text-anchor="middle" font-size="15" font-weight="700" fill="#050B24">Connected Cluster</text>
  <rect x="710" y="112" width="95" height="48" rx="7" fill="#FFF8F3" stroke="#FF6600" stroke-width="1.2"/>
