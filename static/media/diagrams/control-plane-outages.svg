<svg viewBox="0 0 1080 570" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Control plane outage failure domains for vCluster">
  <defs>
    <style><![CDATA[
      text { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
    ]]></style>

    <marker id="control-plane-outages-arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#050B24"/>
    </marker>

    <marker id="control-plane-outages-arrow-muted" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#828592"/>
    </marker>
  </defs>

  <rect width="1080" height="570" fill="#FFFFFF"/>

  <rect x="35" y="34" width="1010" height="502" rx="12" fill="#F8F9FB" stroke="#E6E7E9" stroke-width="1.5"/>
  <text x="55" y="62" font-size="14" font-weight="500" fill="#828592">vCluster control plane outage domains</text>

  <rect x="65" y="82" width="950" height="272" rx="12" fill="#FFFFFF" stroke="#326CE3" stroke-width="1.5"/>
  <text x="87" y="112" font-size="15" font-weight="600" fill="#326CE3">Control plane cluster</text>
  <text x="87" y="134" font-size="13" fill="#828592">Hosts tenant control planes and, with shared nodes, translated workloads</text>

  <rect x="124" y="156" width="294" height="112" rx="8" fill="#FFF7F2" stroke="#FF6600" stroke-width="2"/>
  <text x="271" y="190" font-size="16" font-weight="600" fill="#050B24" text-anchor="middle">Tenant control plane</text>
  <text x="271" y="214" font-size="13" fill="#828592" text-anchor="middle">API server, syncer, data store</text>
  <rect x="170" y="232" width="202" height="24" rx="12" fill="#FFFFFF" stroke="#FF6600" stroke-width="1"/>
  <text x="271" y="249" font-size="12" font-weight="600" fill="#FF6600" text-anchor="middle">Tenant API operations pause</text>

  <rect x="640" y="156" width="300" height="112" rx="8" fill="#FFFFFF" stroke="#9B9DA7" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="790" y="190" font-size="16" font-weight="600" fill="#050B24" text-anchor="middle">Shared-node workloads</text>
  <text x="790" y="214" font-size="13" fill="#828592" text-anchor="middle">Run as translated resources</text>
  <rect x="678" y="232" width="224" height="24" rx="12" fill="#F8F9FB" stroke="#C7C9D1" stroke-width="1"/>
  <text x="790" y="249" font-size="12" font-weight="600" fill="#626675" text-anchor="middle">Depend on control plane cluster</text>

  <rect x="400" y="418" width="280" height="94" rx="8" fill="#FFFFFF" stroke="#9B9DA7" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="540" y="445" font-size="16" font-weight="600" fill="#050B24" text-anchor="middle">Private-node workloads</text>
  <text x="540" y="466" font-size="13" fill="#828592" text-anchor="middle">Run outside the control plane cluster</text>
  <rect x="442" y="480" width="196" height="20" rx="10" fill="#F8F9FB" stroke="#C7C9D1" stroke-width="1"/>
  <text x="540" y="494" font-size="11" font-weight="600" fill="#626675" text-anchor="middle">Runtime may continue</text>

  <line x1="418" y1="205" x2="638" y2="205" stroke="#050B24" stroke-width="1.5" marker-end="url(#control-plane-outages-arrow)"/>
  <text x="528" y="188" font-size="13" fill="#828592" text-anchor="middle">syncs resources</text>

  <path d="M 419 244 L500 244 Q520 244 520 264 L520 292 Q520 312 540 312 L640 312 Q660 312 660 332 L660 418" stroke="#828592" stroke-width="1.5" stroke-dasharray="5 4" fill="none" marker-end="url(#control-plane-outages-arrow-muted)"/>
  <text x="600" y="297" font-size="13" fill="#828592" text-anchor="middle">tenant API dependency</text>

  <rect x="112" y="142" width="318" height="160" rx="12" fill="none" stroke="#FF6600" stroke-width="1.5" stroke-dasharray="8 5"/>
  <rect x="138" y="287" width="266" height="30" rx="15" fill="#FFFFFF" stroke="#FF6600" stroke-width="1.5"/>
  <text x="271" y="307" font-size="13" font-weight="600" fill="#FF6600" text-anchor="middle">Tenant control plane outage</text>

  <rect x="52" y="68" width="976" height="326" rx="14" fill="none" stroke="#326CE3" stroke-width="1.5" stroke-dasharray="8 5"/>
  <rect x="718" y="379" width="280" height="30" rx="15" fill="#FFFFFF" stroke="#326CE3" stroke-width="1.5"/>
  <text x="858" y="399" font-size="13" font-weight="600" fill="#326CE3" text-anchor="middle">Control plane cluster outage</text>

</svg>
