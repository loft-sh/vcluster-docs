<svg viewBox="0 0 1100 638" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
    </style>
    <marker id="arr" viewBox="0 0 10 7" markerWidth="8" markerHeight="6"
            refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#828592"/>
    </marker>
    <marker id="arr-fwd" viewBox="0 0 10 7" markerWidth="8" markerHeight="6"
            refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#FF6600"/>
    </marker>
    <marker id="arr-hc" viewBox="0 0 10 7" markerWidth="8" markerHeight="6"
            refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#FF8433"/>
    </marker>
    <marker id="arr-rev" viewBox="0 0 10 7" markerWidth="8" markerHeight="6"
            refX="1" refY="3.5" orient="auto">
      <path d="M10,0 L0,3.5 L10,7 Z" fill="#FF6600"/>
    </marker>
  </defs>

  <!-- ── Background ─────────────────────────────────────────── -->
  <rect width="1100" height="638" fill="#FFFFFF"/>

  <!-- ── CLUSTER outer container ────────────────────────────── -->
  <rect x="30" y="334" width="1040" height="264" rx="16"
        fill="#FFF8F3"
        stroke="#FF6600" stroke-width="1.5" stroke-dasharray="8,5"/>
  <text x="550" y="352"
        text-anchor="middle"
        font-family="Inter,sans-serif" font-size="13" font-weight="600"
        fill="#FF6600" letter-spacing="0.3">
    Multi-region embedded Kubernetes cluster
  </text>

  <!-- ── Route 53 container ─────────────────────────────────── -->
  <rect x="185" y="92" width="730" height="108" rx="12"
        fill="#F3F5F9" stroke="#B4B6BD" stroke-width="1"/>
  <text x="550" y="110"
        text-anchor="middle"
        font-family="Inter,sans-serif" font-size="13" font-weight="500"
        fill="#505466">
    Route 53 — latency-based routing
  </text>

  <!-- ══════════════════════════════════════════════════════════
       NODES
       ══════════════════════════════════════════════════════════ -->

  <!-- Client -->
  <rect x="395" y="18" width="310" height="56" rx="8"
        fill="#FFFFFF" stroke="#FF6600" stroke-width="1.5"/>
  <text x="550" y="51"
        text-anchor="middle"
        font-family="Inter,sans-serif" font-size="16" font-weight="600"
        fill="#050B24">
    Client
  </text>

  <!-- Health check — us-east-1 -->
  <rect x="220" y="118" width="205" height="58" rx="6"
        fill="#EDEFF3" stroke="#B4B6BD" stroke-width="1"/>
  <text x="322" y="140"
        text-anchor="middle"
        font-family="Inter,sans-serif" font-size="13" font-weight="500"
        fill="#050B24">
    Health check
  </text>
  <text x="322" y="159"
        text-anchor="middle"
        font-family="Inter,sans-serif" font-size="11"
        fill="#828592">
    us-east-1
  </text>

  <!-- Health check — eu-west-1 -->
  <rect x="675" y="118" width="205" height="58" rx="6"
        fill="#EDEFF3" stroke="#B4B6BD" stroke-width="1"/>
  <text x="777" y="140"
        text-anchor="middle"
        font-family="Inter,sans-serif" font-size="13" font-weight="500"
        fill="#050B24">
    Health check
  </text>
  <text x="777" y="159"
        text-anchor="middle"
        font-family="Inter,sans-serif" font-size="11"
        fill="#828592">
    eu-west-1
  </text>

  <!-- US ALB -->
  <rect x="40" y="262" width="215" height="54" rx="8"
        fill="#EDEFF3" stroke="#B4B6BD" stroke-width="1"/>
  <text x="147" y="283"
        text-anchor="middle"
        font-family="Inter,sans-serif" font-size="14" font-weight="600"
        fill="#050B24">
    ALB
  </text>
  <text x="147" y="302"
        text-anchor="middle"
        font-family="Inter,sans-serif" font-size="11"
        fill="#828592">
    us-east-1
  </text>

  <!-- EU ALB -->
  <rect x="845" y="262" width="215" height="54" rx="8"
        fill="#EDEFF3" stroke="#B4B6BD" stroke-width="1"/>
  <text x="952" y="283"
        text-anchor="middle"
        font-family="Inter,sans-serif" font-size="14" font-weight="600"
        fill="#050B24">
    ALB
  </text>
  <text x="952" y="302"
        text-anchor="middle"
        font-family="Inter,sans-serif" font-size="11"
        fill="#828592">
    eu-west-1
  </text>

  <!-- k8s API — us-east-1 (leader) -->
  <rect x="65" y="360" width="315" height="70" rx="6"
        fill="#FFF8F3" stroke="#FF6600" stroke-width="1.5"/>
  <text x="222" y="382"
        text-anchor="middle"
        font-family="Inter,sans-serif" font-size="13" font-weight="600"
        fill="#050B24">
    k8s API — us-east-1
  </text>
  <text x="222" y="402"
        text-anchor="middle"
        font-family="Inter,sans-serif" font-size="11" font-weight="500"
        fill="#FF6600">
    leader (write lease)
  </text>

  <!-- k8s API — eu-west-1 (follower) -->
  <rect x="720" y="360" width="315" height="70" rx="6"
        fill="#EDEFF3" stroke="#B4B6BD" stroke-width="1"/>
  <text x="877" y="382"
        text-anchor="middle"
        font-family="Inter,sans-serif" font-size="13" font-weight="500"
        fill="#050B24">
    k8s API — eu-west-1
  </text>
  <text x="877" y="402"
        text-anchor="middle"
        font-family="Inter,sans-serif" font-size="11"
        fill="#828592">
    follower (read only)
  </text>

  <!-- RDS cylinder -->
  <rect x="462" y="492" width="176" height="58" fill="#FFFFFF" stroke="none"/>
  <line x1="462" y1="492" x2="462" y2="550"
        stroke="#FF6600" stroke-width="1.5"/>
  <line x1="638" y1="492" x2="638" y2="550"
        stroke="#FF6600" stroke-width="1.5"/>
  <ellipse cx="550" cy="550" rx="88" ry="11"
           fill="#FFFFFF" stroke="#FF6600" stroke-width="1.5"/>
  <ellipse cx="550" cy="492" rx="88" ry="11"
           fill="#FFFFFF" stroke="#FF6600" stroke-width="1.5"/>
  <text x="550" y="522"
        text-anchor="middle"
        font-family="Inter,sans-serif" font-size="13" font-weight="600"
        fill="#050B24">
    Amazon RDS
  </text>
  <text x="550" y="552"
        text-anchor="middle"
        font-family="Inter,sans-serif" font-size="11"
        fill="#828592">
    shared database
  </text>

  <!-- ══════════════════════════════════════════════════════════
       CONNECTIONS — drawn before labels so labels render on top
       ══════════════════════════════════════════════════════════ -->

  <!-- Client → Route 53 -->
  <line x1="550" y1="74" x2="550" y2="92"
        stroke="#828592" stroke-width="1.5"
        marker-end="url(#arr)"/>

  <!-- Route 53 → US ALB (solid routing arrow, starts inner-left of R53) -->
  <line x1="430" y1="200" x2="147" y2="262"
        stroke="#828592" stroke-width="1.5"
        marker-end="url(#arr)"/>

  <!-- Route 53 → EU ALB (solid routing arrow, starts inner-right of R53) -->
  <line x1="670" y1="200" x2="952" y2="262"
        stroke="#828592" stroke-width="1.5"
        marker-end="url(#arr)"/>

  <!-- HC us-east-1 → US ALB (dashed health check) -->
  <line x1="322" y1="176" x2="147" y2="262"
        stroke="#FF8433" stroke-width="1.5" stroke-dasharray="5,3"
        marker-end="url(#arr-hc)"/>

  <!-- HC eu-west-1 → EU ALB (dashed health check) -->
  <line x1="777" y1="176" x2="952" y2="262"
        stroke="#FF8433" stroke-width="1.5" stroke-dasharray="5,3"
        marker-end="url(#arr-hc)"/>

  <!-- US ALB → US k8s API -->
  <line x1="147" y1="316" x2="190" y2="360"
        stroke="#828592" stroke-width="1.5"
        marker-end="url(#arr)"/>

  <!-- EU ALB → EU k8s API -->
  <line x1="952" y1="316" x2="910" y2="360"
        stroke="#828592" stroke-width="1.5"
        marker-end="url(#arr)"/>

  <!-- US k8s API ↔ EU k8s API (lease coordination) -->
  <line x1="380" y1="395" x2="720" y2="395"
        stroke="#FF6600" stroke-width="1.5"
        marker-start="url(#arr-rev)" marker-end="url(#arr-fwd)"/>

  <!-- US k8s API → RDS (writes, right-angle) -->
  <path d="M222,430 L222,462 L462,462 L462,481"
        fill="none" stroke="#828592" stroke-width="1.5"
        marker-end="url(#arr)"/>

  <!-- EU k8s API → RDS (reads, dashed right-angle) -->
  <path d="M877,430 L877,462 L638,462 L638,481"
        fill="none" stroke="#828592" stroke-width="1.5" stroke-dasharray="5,3"
        marker-end="url(#arr)"/>

  <!-- ══════════════════════════════════════════════════════════
       LABELS — all with white pill backgrounds for legibility
       ══════════════════════════════════════════════════════════ -->

  <!-- Client → R53: "platform.example.com" to the right of arrow -->
  <rect x="556" y="77" width="174" height="17" rx="3"
        fill="#FFFFFF" fill-opacity="0.95"/>
  <text x="560" y="89"
        font-family="Inter,sans-serif" font-size="11" font-style="italic"
        fill="#828592">
    platform.example.com
  </text>

  <!-- R53 → US ALB: "nearest healthy region" — inner -->
  <rect x="291" y="234" width="162" height="17" rx="3"
        fill="#FFFFFF" fill-opacity="0.97"/>
  <text x="372" y="246"
        text-anchor="middle"
        font-family="Inter,sans-serif" font-size="11" font-style="italic"
        fill="#828592">
    nearest healthy region
  </text>

  <!-- R53 → EU ALB: "nearest healthy region" — inner -->
  <rect x="647" y="234" width="162" height="17" rx="3"
        fill="#FFFFFF" fill-opacity="0.97"/>
  <text x="728" y="246"
        text-anchor="middle"
        font-family="Inter,sans-serif" font-size="11" font-style="italic"
        fill="#828592">
    nearest healthy region
  </text>

  <!-- HC us-east-1 → US ALB: "polls /healthz" — outer/left -->
  <rect x="90" y="210" width="108" height="17" rx="3"
        fill="#FFFFFF" fill-opacity="0.97"/>
  <text x="144" y="222"
        text-anchor="middle"
        font-family="Inter,sans-serif" font-size="11" font-style="italic"
        fill="#FF8433">
    polls /healthz
  </text>

  <!-- HC eu-west-1 → EU ALB: "polls /healthz" — outer/right -->
  <rect x="902" y="210" width="108" height="17" rx="3"
        fill="#FFFFFF" fill-opacity="0.97"/>
  <text x="956" y="222"
        text-anchor="middle"
        font-family="Inter,sans-serif" font-size="11" font-style="italic"
        fill="#FF8433">
    polls /healthz
  </text>

  <!-- Lease coordination label -->
  <rect x="462" y="384" width="176" height="17" rx="3"
        fill="#FFFFFF" fill-opacity="0.97"/>
  <text x="550" y="396"
        text-anchor="middle"
        font-family="Inter,sans-serif" font-size="11" font-style="italic"
        fill="#FF6600">
    lease coordination
  </text>

  <!-- Writes label -->
  <rect x="310" y="452" width="60" height="17" rx="3"
        fill="#FFFFFF" fill-opacity="0.97"/>
  <text x="340" y="464"
        text-anchor="middle"
        font-family="Inter,sans-serif" font-size="11" font-style="italic"
        fill="#828592">
    writes
  </text>

  <!-- Reads label -->
  <rect x="725" y="452" width="56" height="17" rx="3"
        fill="#FFFFFF" fill-opacity="0.97"/>
  <text x="753" y="464"
        text-anchor="middle"
        font-family="Inter,sans-serif" font-size="11" font-style="italic"
        fill="#828592">
    reads
  </text>

  <!-- ── Attribution ────────────────────────────────────────── -->
  <text x="1088" y="628"
        text-anchor="end"
        font-family="Inter,sans-serif" font-size="10" font-weight="500"
        fill="#B4B6BD">
    vCluster Labs
  </text>
</svg>
