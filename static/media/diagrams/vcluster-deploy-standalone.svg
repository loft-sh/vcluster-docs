<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 420" role="img" aria-labelledby="title desc" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, Helvetica, Arial, sans-serif">
  <title id="title">Deploying vCluster Standalone on bare metal or VMs</title>
  <desc id="desc">A Standalone cluster runs as a single binary directly on bare metal or VMs, with no host Kubernetes cluster in between. Additional workers can be joined.</desc>

  <defs>
    <symbol id="vmark" viewBox="0 0 400 400">
      <path fill="currentColor" fill-rule="evenodd" clip-rule="evenodd" d="M323.667 97.4801L271.365 189.801L271.046 190.371L246.732 233.282L216.874 180.609L251.627 119.459V119.42C252.131 118.504 252.648 117.602 253.179 116.727C253.179 116.727 253.179 116.727 253.179 116.7L253.206 116.661C262.186 101.937 278.116 91.9355 296.448 91.2192C297.137 91.1927 297.84 91.1794 298.543 91.1794C299.246 91.1794 299.95 91.1794 300.639 91.2192C308.943 91.5376 316.756 93.766 323.653 97.4934L323.667 97.4801Z"/>
      <path fill="currentColor" fill-rule="evenodd" clip-rule="evenodd" d="M232.301 101.499L202.31 154.239H129.58C112.204 154.239 96.0611 145.67 86.3117 131.543C86.2321 131.437 86.1657 131.331 86.0994 131.238C85.9535 131.026 85.8076 130.814 85.675 130.602C85.025 129.62 84.4149 128.612 83.8312 127.591L83.2874 126.622C79.2682 119.207 77 110.731 77 101.712C77 101.645 77 101.579 77 101.513H232.314L232.301 101.499Z"/>
      <path fill="currentColor" fill-rule="evenodd" clip-rule="evenodd" d="M230.842 270.635C230.842 290.16 220.124 307.192 204.246 316.159L152.754 225.217L127.445 180.529H187.427L223.599 244.093C223.626 244.132 223.639 244.159 223.666 244.199L224.024 244.822C225.324 247.09 226.425 249.438 227.353 251.839C227.406 251.972 227.459 252.118 227.512 252.25C229.661 257.967 230.842 264.175 230.842 270.648V270.635Z"/>
    </symbol>
    <symbol id="server" viewBox="0 0 120 22">
      <rect x="1" y="1" width="118" height="20" rx="3" fill="none" stroke="currentColor" stroke-width="1.5"/>
      <circle cx="10" cy="11" r="1.8" fill="currentColor"/>
      <circle cx="16" cy="11" r="1.8" fill="currentColor" opacity="0.6"/>
      <rect x="26" y="7" width="34" height="3" rx="1" fill="currentColor" opacity="0.55"/>
      <rect x="26" y="12" width="22" height="3" rx="1" fill="currentColor" opacity="0.35"/>
      <rect x="78" y="5" width="36" height="12" rx="1.5" fill="none" stroke="currentColor" stroke-width="1" opacity="0.6"/>
    </symbol>
    <symbol id="vm" viewBox="0 0 60 44">
      <rect x="1" y="1" width="58" height="42" rx="4" fill="none" stroke="currentColor" stroke-width="1.5"/>
      <rect x="8" y="8" width="44" height="4" rx="1" fill="currentColor" opacity="0.5"/>
      <rect x="8" y="16" width="28" height="3" rx="1" fill="currentColor" opacity="0.3"/>
      <rect x="8" y="22" width="36" height="3" rx="1" fill="currentColor" opacity="0.3"/>
      <rect x="8" y="28" width="20" height="3" rx="1" fill="currentColor" opacity="0.3"/>
      <text x="50" y="38" text-anchor="end" font-size="6" fill="currentColor" opacity="0.7" font-weight="600">VM</text>
    </symbol>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#FF6600" stroke-width="0.6" opacity="0.05"/>
    </pattern>
    <radialGradient id="orangeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF6600" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#FF6600" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="480" height="420" rx="14" fill="#060B24"/>
  <rect width="480" height="420" rx="14" fill="url(#grid)"/>

  <!-- Top tag: Standalone cluster -->
  <g>
    <ellipse cx="240" cy="62" rx="200" ry="56" fill="url(#orangeGlow)"/>
    <rect x="100" y="32" width="280" height="58" rx="12" fill="#1A0D04" stroke="#FF6600" stroke-width="1.6"/>
    <g transform="translate(118, 46)" color="#FF6600">
      <use href="#vmark" width="30" height="30"/>
    </g>
    <text x="158" y="58" fill="#FFFFFF" font-size="15" font-weight="700">Standalone cluster</text>
    <text x="158" y="76" fill="#FF9A57" font-size="12" font-weight="500">single binary, no dependencies</text>
  </g>

  <!-- Middle layer: NO HOST CLUSTER empty zone with cluster + optional workers -->
  <g transform="translate(40, 118)">
    <rect width="400" height="160" rx="12" fill="none" stroke="#2B3A70" stroke-width="1.3" stroke-dasharray="3 4" opacity="0.55"/>
    <text x="16" y="22" fill="#5A6690" font-size="11" font-weight="700" letter-spacing="0.8" opacity="0.85">NO HOST CLUSTER</text>

    <!-- Cluster + 2 optional workers -->
    <g transform="translate(20, 40)">
      <!-- Primary cluster -->
      <g>
        <rect width="110" height="104" rx="10" fill="#060B24" stroke="#FF6600" stroke-width="1.6"/>
        <g transform="translate(35, 12)" color="#FF6600">
          <use href="#vmark" width="40" height="40"/>
        </g>
        <text x="55" y="74" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="600">cluster</text>
        <rect x="18" y="83" width="74" height="13" rx="2.5" fill="#FF6600" opacity="0.18"/>
        <text x="55" y="92" text-anchor="middle" fill="#FF6600" font-size="8.5" font-weight="700" letter-spacing="0.5">STANDALONE</text>
      </g>
      <!-- Optional worker 1 -->
      <g transform="translate(125, 0)">
        <rect width="110" height="104" rx="10" fill="#060B24" stroke="#FF9A57" stroke-width="1.3" stroke-dasharray="4 3"/>
        <circle cx="55" cy="34" r="18" fill="none" stroke="#FF9A57" stroke-width="1.6"/>
        <circle cx="55" cy="34" r="6" fill="#FF9A57"/>
        <text x="55" y="74" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="600">worker</text>
        <rect x="18" y="83" width="74" height="13" rx="2.5" fill="#FF9A57" opacity="0.18"/>
        <text x="55" y="92" text-anchor="middle" fill="#FF9A57" font-size="8.5" font-weight="700" letter-spacing="0.5">OPTIONAL</text>
      </g>
      <!-- Optional worker 2 -->
      <g transform="translate(250, 0)">
        <rect width="110" height="104" rx="10" fill="#060B24" stroke="#FF9A57" stroke-width="1.3" stroke-dasharray="4 3"/>
        <circle cx="55" cy="34" r="18" fill="none" stroke="#FF9A57" stroke-width="1.6"/>
        <circle cx="55" cy="34" r="6" fill="#FF9A57"/>
        <text x="55" y="74" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="600">worker</text>
        <rect x="18" y="83" width="74" height="13" rx="2.5" fill="#FF9A57" opacity="0.18"/>
        <text x="55" y="92" text-anchor="middle" fill="#FF9A57" font-size="8.5" font-weight="700" letter-spacing="0.5">OPTIONAL</text>
      </g>
    </g>
  </g>

  <!-- Connectors from top tag bottom to card tops -->
  <g stroke="#FF6600" stroke-width="1.1" opacity="0.55" stroke-dasharray="3 3">
    <line x1="150" y1="92" x2="115" y2="158"/>
    <line x1="240" y1="92" x2="240" y2="158"/>
    <line x1="330" y1="92" x2="365" y2="158"/>
  </g>

  <!-- Infrastructure: bare metal + VMs -->
  <g transform="translate(40, 296)">
    <rect width="400" height="58" rx="10" fill="#0E1636" stroke="#23305A" stroke-width="1"/>
    <text x="16" y="18" fill="#6E7AA5" font-size="11" font-weight="700" letter-spacing="0.8">BARE METAL &amp; VMS</text>
    <g transform="translate(18, 24)" color="#6E7AA5">
      <use href="#server" x="0"   y="4" width="100" height="18"/>
      <use href="#vm"     x="108" y="0" width="28" height="26"/>
      <use href="#vm"     x="140" y="0" width="28" height="26"/>
      <use href="#server" x="174" y="4" width="100" height="18"/>
      <use href="#vm"     x="282" y="0" width="28" height="26"/>
      <use href="#vm"     x="314" y="0" width="28" height="26"/>
    </g>
  </g>

  <!-- Caption -->
  <text x="240" y="380" text-anchor="middle" fill="#D8DEF1" font-size="13" font-weight="500">No host cluster, no heavyweight distro.</text>
  <text x="240" y="400" text-anchor="middle" fill="#6E7AA5" font-size="11.5">Best for GPU workloads, edge, and air-gapped sites.</text>
</svg>
