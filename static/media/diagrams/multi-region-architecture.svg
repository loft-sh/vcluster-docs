<svg viewBox="0 0 1100 780" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
    </style>
    <!-- Gray arrow (standard flow) -->
    <marker id="arr" viewBox="0 0 10 7" markerWidth="8" markerHeight="6"
            refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#828592"/>
    </marker>
    <!-- Orange forward arrow (DERP relay) -->
    <marker id="arr-fwd" viewBox="0 0 10 7" markerWidth="8" markerHeight="6"
            refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#FF6600"/>
    </marker>
    <!-- Orange reverse arrow (DERP relay) -->
    <marker id="arr-rev" viewBox="0 0 10 7" markerWidth="8" markerHeight="6"
            refX="1" refY="3.5" orient="auto">
      <path d="M10,0 L0,3.5 L10,7 Z" fill="#FF6600"/>
    </marker>
  </defs>

  <!-- ── Background ─────────────────────────────────────────── -->
  <rect width="1100" height="780" fill="#FFFFFF"/>

  <!-- ── MRDB outer container ───────────────────────────────── -->
  <rect x="20" y="200" width="1060" height="550" rx="16"
        fill="#FFF8F3"
        stroke="#FF6600" stroke-width="1.5" stroke-dasharray="8,5"/>
  <text x="550" y="222"
        text-anchor="middle"
        font-family="Inter,sans-serif" font-size="13" font-weight="600"
        fill="#FF6600" letter-spacing="0.3">
    Multi-region embedded Kubernetes cluster
  </text>

  <!-- ── US EKS box ─────────────────────────────────────────── -->
  <rect x="35" y="228" width="490" height="357" rx="12"
        fill="#F3F5F9" stroke="#B4B6BD" stroke-width="1"/>
  <text x="280" y="246"
        text-anchor="middle"
        font-family="Inter,sans-serif" font-size="12" font-weight="500"
        fill="#505466">
    EKS — us-east-1
  </text>

  <!-- ── EU EKS box ─────────────────────────────────────────── -->
  <rect x="575" y="228" width="490" height="357" rx="12"
        fill="#F3F5F9" stroke="#B4B6BD" stroke-width="1"/>
  <text x="820" y="246"
        text-anchor="middle"
        font-family="Inter,sans-serif" font-size="12" font-weight="500"
        fill="#505466">
    EKS — eu-west-1
  </text>

  <!-- ── US vcluster-platform namespace ────────────────────── -->
  <rect x="50" y="255" width="460" height="300" rx="8"
        fill="#FFFFFF"
        stroke="#E6E7E9" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="280" y="271"
        text-anchor="middle"
        font-family="Inter,sans-serif" font-size="11" font-weight="500"
        fill="#828592" letter-spacing="0.3">
    vcluster-platform
  </text>

  <!-- ── EU vcluster-platform namespace ────────────────────── -->
  <rect x="590" y="255" width="460" height="300" rx="8"
        fill="#FFFFFF"
        stroke="#E6E7E9" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="820" y="271"
        text-anchor="middle"
        font-family="Inter,sans-serif" font-size="11" font-weight="500"
        fill="#828592" letter-spacing="0.3">
    vcluster-platform
  </text>

  <!-- ══════════════════════════════════════════════════════════
       NODES
       ══════════════════════════════════════════════════════════ -->

  <!-- DNS / Route 53 -->
  <rect x="300" y="20" width="500" height="64" rx="8"
        fill="#FFFFFF" stroke="#FF6600" stroke-width="1.5"/>
  <text x="550" y="44"
        text-anchor="middle"
        font-family="Inter,sans-serif" font-size="16" font-weight="600"
        fill="#050B24">
    platform.example.com
  </text>
  <text x="550" y="66"
        text-anchor="middle"
        font-family="Inter,sans-serif" font-size="12" font-weight="400"
        fill="#828592">
    Route 53 — latency-based routing
  </text>

  <!-- US ALB -->
  <rect x="50" y="118" width="210" height="50" rx="8"
        fill="#EDEFF3" stroke="#B4B6BD" stroke-width="1"/>
  <text x="155" y="138"
        text-anchor="middle"
        font-family="Inter,sans-serif" font-size="14" font-weight="600"
        fill="#050B24">
    ALB
  </text>
  <text x="155" y="157"
        text-anchor="middle"
        font-family="Inter,sans-serif" font-size="11"
        fill="#828592">
    us-east-1
  </text>

  <!-- EU ALB -->
  <rect x="840" y="118" width="210" height="50" rx="8"
        fill="#EDEFF3" stroke="#B4B6BD" stroke-width="1"/>
  <text x="945" y="138"
        text-anchor="middle"
        font-family="Inter,sans-serif" font-size="14" font-weight="600"
        fill="#050B24">
    ALB
  </text>
  <text x="945" y="157"
        text-anchor="middle"
        font-family="Inter,sans-serif" font-size="11"
        fill="#828592">
    eu-west-1
  </text>

  <!-- US k8s API -->
  <rect x="65" y="285" width="160" height="52" rx="6"
        fill="#EDEFF3" stroke="#B4B6BD" stroke-width="1"/>
  <text x="145" y="306"
        text-anchor="middle"
        font-family="Inter,sans-serif" font-size="13" font-weight="500"
        fill="#050B24">
    k8s API
  </text>
  <text x="145" y="326"
        text-anchor="middle"
        font-family="Inter,sans-serif" font-size="10"
        fill="#828592">
    us-east-1
  </text>

  <!-- US Kine -->
  <rect x="267" y="285" width="148" height="52" rx="6"
        fill="#EDEFF3" stroke="#B4B6BD" stroke-width="1"/>
  <text x="341" y="316"
        text-anchor="middle"
        font-family="Inter,sans-serif" font-size="13" font-weight="500"
        fill="#050B24">
    Kine
  </text>

  <!-- US DERP -->
  <rect x="88" y="415" width="240" height="68" rx="6"
        fill="#EDEFF3" stroke="#B4B6BD" stroke-width="1"/>
  <text x="208" y="440"
        text-anchor="middle"
        font-family="Inter,sans-serif" font-size="13" font-weight="600"
        fill="#050B24">
    DERP
  </text>
  <text x="208" y="461"
        text-anchor="middle"
        font-family="Inter,sans-serif" font-size="11"
        fill="#828592">
    us.platform.example.com
  </text>

  <!-- EU k8s API -->
  <rect x="605" y="285" width="160" height="52" rx="6"
        fill="#EDEFF3" stroke="#B4B6BD" stroke-width="1"/>
  <text x="685" y="306"
        text-anchor="middle"
        font-family="Inter,sans-serif" font-size="13" font-weight="500"
        fill="#050B24">
    k8s API
  </text>
  <text x="685" y="326"
        text-anchor="middle"
        font-family="Inter,sans-serif" font-size="10"
        fill="#828592">
    eu-west-1
  </text>

  <!-- EU Kine -->
  <rect x="805" y="285" width="148" height="52" rx="6"
        fill="#EDEFF3" stroke="#B4B6BD" stroke-width="1"/>
  <text x="879" y="316"
        text-anchor="middle"
        font-family="Inter,sans-serif" font-size="13" font-weight="500"
        fill="#050B24">
    Kine
  </text>

  <!-- EU DERP -->
  <rect x="630" y="415" width="240" height="68" rx="6"
        fill="#EDEFF3" stroke="#B4B6BD" stroke-width="1"/>
  <text x="750" y="440"
        text-anchor="middle"
        font-family="Inter,sans-serif" font-size="13" font-weight="600"
        fill="#050B24">
    DERP
  </text>
  <text x="750" y="461"
        text-anchor="middle"
        font-family="Inter,sans-serif" font-size="11"
        fill="#828592">
    eu.platform.example.com
  </text>

  <!-- RDS cylinder -->
  <!-- Sides (no horizontal stroke — ellipses handle top/bottom) -->
  <rect x="460" y="630" width="180" height="68" fill="#FFFFFF" stroke="none"/>
  <line x1="460" y1="630" x2="460" y2="698"
        stroke="#FF6600" stroke-width="1.5"/>
  <line x1="640" y1="630" x2="640" y2="698"
        stroke="#FF6600" stroke-width="1.5"/>
  <!-- Bottom cap -->
  <ellipse cx="550" cy="698" rx="90" ry="12"
           fill="#FFFFFF" stroke="#FF6600" stroke-width="1.5"/>
  <!-- Top cap (drawn after body so it renders above the fill) -->
  <ellipse cx="550" cy="630" rx="90" ry="12"
           fill="#FFFFFF" stroke="#FF6600" stroke-width="1.5"/>
  <text x="550" y="660"
        text-anchor="middle"
        font-family="Inter,sans-serif" font-size="13" font-weight="600"
        fill="#050B24">
    Amazon RDS
  </text>
  <text x="550" y="680"
        text-anchor="middle"
        font-family="Inter,sans-serif" font-size="11"
        fill="#828592">
    shared database
  </text>

  <!-- ══════════════════════════════════════════════════════════
       CONNECTIONS
       ══════════════════════════════════════════════════════════ -->

  <!-- DNS → US ALB -->
  <line x1="430" y1="84" x2="205" y2="118"
        stroke="#828592" stroke-width="1.5"
        marker-end="url(#arr)"/>
  <text x="300" y="98"
        text-anchor="middle"
        font-family="Inter,sans-serif" font-size="11" font-style="italic"
        fill="#828592">
    latency routing
  </text>

  <!-- DNS → EU ALB -->
  <line x1="670" y1="84" x2="895" y2="118"
        stroke="#828592" stroke-width="1.5"
        marker-end="url(#arr)"/>
  <text x="800" y="98"
        text-anchor="middle"
        font-family="Inter,sans-serif" font-size="11" font-style="italic"
        fill="#828592">
    latency routing
  </text>

  <!-- US ALB → US k8s API (near-vertical; US ALB is roughly above US k8s API) -->
  <line x1="155" y1="168" x2="145" y2="285"
        stroke="#828592" stroke-width="1.5"
        marker-end="url(#arr)"/>

  <!-- EU ALB → EU k8s API
       Route: down along x=945 (right of all label text), then left above
       the Kine/k8s API nodes, then drop into EU k8s API from above.
       At x=945, the MRDB/EKS/NS labels are all centered at x=550–820
       so x=945 is clear of them. -->
  <path d="M945,168 L945,275 L685,275 L685,285"
        fill="none" stroke="#828592" stroke-width="1.5"
        marker-end="url(#arr)"/>

  <!-- US k8s API → US Kine -->
  <line x1="225" y1="311" x2="265" y2="311"
        stroke="#828592" stroke-width="1.5"
        marker-end="url(#arr)"/>

  <!-- EU k8s API → EU Kine -->
  <line x1="765" y1="311" x2="803" y2="311"
        stroke="#828592" stroke-width="1.5"
        marker-end="url(#arr)"/>

  <!-- US Kine → RDS
       Exits Kine bottom, drops to y=395 (gap between k8s/Kine row and DERP row),
       runs right to x=530 (between the two Kine→RDS paths), then drops to RDS top. -->
  <path d="M341,337 L341,395 L530,395 L530,618"
        fill="none" stroke="#828592" stroke-width="1.5" stroke-dasharray="5,3"
        marker-end="url(#arr)"/>

  <!-- EU Kine → RDS
       Exits Kine bottom, drops to y=395 (above EU DERP which starts at y=415),
       runs left to x=570, then drops to RDS top. Clears EU DERP entirely. -->
  <path d="M879,337 L879,395 L570,395 L570,618"
        fill="none" stroke="#828592" stroke-width="1.5" stroke-dasharray="5,3"
        marker-end="url(#arr)"/>

  <!-- US DERP ↔ EU DERP (bidirectional encrypted relay) -->
  <line x1="328" y1="449" x2="630" y2="449"
        stroke="#FF6600" stroke-width="1.5"
        marker-start="url(#arr-rev)" marker-end="url(#arr-fwd)"/>
  <!-- Label pill -->
  <rect x="420" y="434" width="160" height="20" rx="4"
        fill="#FFFFFF" fill-opacity="0.95"/>
  <text x="500" y="448"
        text-anchor="middle"
        font-family="Inter,sans-serif" font-size="11" font-style="italic"
        fill="#FF6600">
    encrypted relay
  </text>

  <!-- ── Attribution ────────────────────────────────────────── -->
  <text x="1088" y="770"
        text-anchor="end"
        font-family="Inter,sans-serif" font-size="10" font-weight="500"
        fill="#B4B6BD">
    vCluster Labs
  </text>
</svg>
