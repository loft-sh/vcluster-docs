<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 420" role="img" aria-labelledby="title desc" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, Helvetica, Arial, sans-serif">
  <title id="title">Deploying vCluster on Docker with vind</title>
  <desc id="desc">A vind cluster runs a full Kubernetes control plane and workers as Docker containers on any machine with Docker installed.</desc>

  <defs>
    <symbol id="vmark" viewBox="0 0 400 400">
      <path fill="currentColor" fill-rule="evenodd" clip-rule="evenodd" d="M323.667 97.4801L271.365 189.801L271.046 190.371L246.732 233.282L216.874 180.609L251.627 119.459V119.42C252.131 118.504 252.648 117.602 253.179 116.727C253.179 116.727 253.179 116.727 253.179 116.7L253.206 116.661C262.186 101.937 278.116 91.9355 296.448 91.2192C297.137 91.1927 297.84 91.1794 298.543 91.1794C299.246 91.1794 299.95 91.1794 300.639 91.2192C308.943 91.5376 316.756 93.766 323.653 97.4934L323.667 97.4801Z"/>
      <path fill="currentColor" fill-rule="evenodd" clip-rule="evenodd" d="M232.301 101.499L202.31 154.239H129.58C112.204 154.239 96.0611 145.67 86.3117 131.543C86.2321 131.437 86.1657 131.331 86.0994 131.238C85.9535 131.026 85.8076 130.814 85.675 130.602C85.025 129.62 84.4149 128.612 83.8312 127.591L83.2874 126.622C79.2682 119.207 77 110.731 77 101.712C77 101.645 77 101.579 77 101.513H232.314L232.301 101.499Z"/>
      <path fill="currentColor" fill-rule="evenodd" clip-rule="evenodd" d="M230.842 270.635C230.842 290.16 220.124 307.192 204.246 316.159L152.754 225.217L127.445 180.529H187.427L223.599 244.093C223.626 244.132 223.639 244.159 223.666 244.199L224.024 244.822C225.324 247.09 226.425 249.438 227.353 251.839C227.406 251.972 227.459 252.118 227.512 252.25C229.661 257.967 230.842 264.175 230.842 270.648V270.635Z"/>
    </symbol>
    <symbol id="docker-mark" viewBox="0 0 120 80">
      <g fill="currentColor">
        <rect x="12" y="30" width="14" height="14" rx="1.5"/>
        <rect x="30" y="30" width="14" height="14" rx="1.5"/>
        <rect x="48" y="30" width="14" height="14" rx="1.5"/>
        <rect x="66" y="30" width="14" height="14" rx="1.5"/>
        <rect x="30" y="14" width="14" height="14" rx="1.5"/>
        <rect x="48" y="14" width="14" height="14" rx="1.5"/>
      </g>
      <path d="M6 48 Q 60 68 114 48 L 114 58 Q 60 78 6 58 Z" fill="currentColor" opacity="0.6"/>
      <circle cx="102" cy="46" r="3" fill="currentColor"/>
    </symbol>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#FF6600" stroke-width="0.6" opacity="0.05"/>
    </pattern>
    <radialGradient id="orangeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF6600" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#FF6600" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="480" height="420" rx="14" fill="#060B24"/>
  <rect width="480" height="420" rx="14" fill="url(#grid)"/>

  <!-- Top tag: vind cluster -->
  <g>
    <ellipse cx="240" cy="62" rx="200" ry="56" fill="url(#orangeGlow)"/>
    <rect x="100" y="32" width="280" height="58" rx="12" fill="#1A0D04" stroke="#FF6600" stroke-width="1.6"/>
    <g transform="translate(118, 46)" color="#FF6600">
      <use href="#vmark" width="30" height="30"/>
    </g>
    <text x="158" y="58" fill="#FFFFFF" font-size="15" font-weight="700">vind cluster</text>
    <text x="158" y="76" fill="#FF9A57" font-size="12" font-weight="500">control plane + workers</text>
  </g>

  <!-- Middle layer: DOCKER HOST -->
  <g transform="translate(40, 118)">
    <rect width="400" height="160" rx="12" fill="#121B42" stroke="#2B3A70" stroke-width="1.3"/>
    <text x="16" y="22" fill="#8FA3D9" font-size="11" font-weight="700" letter-spacing="0.8">DOCKER HOST</text>
    <g transform="translate(350, 10)" color="#8FA3D9">
      <use href="#docker-mark" width="40" height="28"/>
    </g>

    <!-- Control plane container + 2 workers -->
    <g transform="translate(20, 40)">
      <g>
        <rect width="110" height="104" rx="8" fill="#060B24" stroke="#FF6600" stroke-width="1.6"/>
        <g transform="translate(35, 10)" color="#FF6600">
          <use href="#vmark" width="40" height="40"/>
        </g>
        <text x="55" y="72" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="600">control plane</text>
        <rect x="18" y="81" width="74" height="14" rx="2.5" fill="#FF6600" opacity="0.18"/>
        <text x="55" y="91" text-anchor="middle" fill="#FF6600" font-size="8.5" font-weight="700" letter-spacing="0.5">CONTAINER</text>
      </g>
      <g transform="translate(125, 0)">
        <rect width="110" height="104" rx="8" fill="#060B24" stroke="#FF9A57" stroke-width="1.3" stroke-dasharray="4 3"/>
        <circle cx="55" cy="34" r="18" fill="none" stroke="#FF9A57" stroke-width="1.6"/>
        <circle cx="55" cy="34" r="6" fill="#FF9A57"/>
        <text x="55" y="72" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="600">worker</text>
        <rect x="18" y="81" width="74" height="14" rx="2.5" fill="#FF9A57" opacity="0.18"/>
        <text x="55" y="91" text-anchor="middle" fill="#FF9A57" font-size="8.5" font-weight="700" letter-spacing="0.5">CONTAINER</text>
      </g>
      <g transform="translate(250, 0)">
        <rect width="110" height="104" rx="8" fill="#060B24" stroke="#FF9A57" stroke-width="1.3" stroke-dasharray="4 3"/>
        <circle cx="55" cy="34" r="18" fill="none" stroke="#FF9A57" stroke-width="1.6"/>
        <circle cx="55" cy="34" r="6" fill="#FF9A57"/>
        <text x="55" y="72" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="600">worker</text>
        <rect x="18" y="81" width="74" height="14" rx="2.5" fill="#FF9A57" opacity="0.18"/>
        <text x="55" y="91" text-anchor="middle" fill="#FF9A57" font-size="8.5" font-weight="700" letter-spacing="0.5">CONTAINER</text>
      </g>
    </g>
  </g>

  <!-- Connectors from top tag bottom to container tops -->
  <g stroke="#FF6600" stroke-width="1.1" opacity="0.55" stroke-dasharray="3 3">
    <line x1="150" y1="92" x2="115" y2="158"/>
    <line x1="240" y1="92" x2="240" y2="158"/>
    <line x1="330" y1="92" x2="365" y2="158"/>
  </g>

  <!-- Infrastructure: laptop / CI runner -->
  <g transform="translate(40, 296)">
    <rect width="400" height="58" rx="10" fill="#0E1636" stroke="#23305A" stroke-width="1"/>
    <text x="16" y="18" fill="#6E7AA5" font-size="11" font-weight="700" letter-spacing="0.8">LAPTOP OR CI RUNNER</text>
    <g transform="translate(160, 20)" fill="none" stroke="#6E7AA5" stroke-width="1.4" stroke-linejoin="round" stroke-linecap="round">
      <rect x="0" y="0" width="80" height="28" rx="2"/>
      <rect x="4" y="4" width="72" height="20" rx="1" fill="#060B24"/>
      <path d="M -8 30 L 88 30 L 82 34 L -2 34 Z" fill="#6E7AA5" opacity="0.25" stroke="none"/>
      <line x1="10" y1="10" x2="24" y2="10" stroke="#FF6600" opacity="0.75"/>
      <line x1="10" y1="16" x2="44" y2="16" stroke="#6E7AA5" opacity="0.5"/>
    </g>
  </g>

  <!-- Caption -->
  <text x="240" y="380" text-anchor="middle" fill="#D8DEF1" font-size="13" font-weight="500">Full Kubernetes in Docker containers.</text>
  <text x="240" y="400" text-anchor="middle" fill="#6E7AA5" font-size="11.5">Best for local dev, offline CI, and testing.</text>
</svg>
