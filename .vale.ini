StylesPath = .github/styles
MinAlertLevel = warning

Vocab = Loft

[formats]
mdx = md

[*.{md,mdx}]
BasedOnStyles = Loft, Google, Vale
Vale.Spelling = NO

# Ignore JSX tags in .mdx files
BlockIgnores = '(<(?!(?i:Flow|Step)\b)([a-zA-Z]+)(?:\s+[^>]*)?>)([\s\S]*?)(<\/\2>)'
BlockIgnores = 'import .*'
BlockIgnores = '(<InterpolatedCodeBlock[\s\S]*?/>)'
BlockIgnores = '(<InterpolatedCodeBlock[^>]*>[\s\S]*?</InterpolatedCodeBlock>)'
BlockIgnores = '\[.+?\]\(https?://.+?\)'

TokenIgnores = (\(#.*\)),(\]\(),(http.*),({{<\s*\/?expand),(\!\[),(\d.*px),(\d\.\d\.\d),(\S*vcluster\.com/\S+)
TokenIgnores = (?<=\[[\s\S]+?\])\([^)]+\)
Google.OxfordComma = YES
Google.Quotes = NO
Google.Spacing = NO
Google.Latin = NO
Google.Will = NO

# Auto-generated config docs have camelCase terms in frontmatter description
# fields (e.g., "statefulSet", "coredns", "rbac") that trigger Vale.Terms
# false positives. These files are regenerated by hack/vcluster/partials/.
[**/configure/vcluster-yaml/**]
BasedOnStyles = Loft, Google, Vale
Vale.Terms = NO

# Quick-start guides contain CLI commands (vcluster create, vcluster connect,
# etc.) inside <Step> components. Vale.Terms fires on "vcluster" in code blocks
# because <Step> is intentionally excluded from BlockIgnores in this config.
[**/quick-start/**]
BasedOnStyles = Loft, Google, Vale
Vale.Terms = NO

# Security docs reference camelCase vcluster.yaml keys (e.g., networkPolicy,
# podSecurityStandard) in inline code spans. Vale.Terms fires on these as
# false positives since they are config identifiers, not prose.
[**/security/**]
BasedOnStyles = Loft, Google, Vale
Vale.Terms = NO

# Docker container deploy guides use the same <Flow>/<Step> pattern and contain
# vcluster CLI commands and file paths (e.g. /loft-sh/vcluster/releases/) inside
# <Step> components. Same root cause as quick-start above.
[**/deploy/control-plane/docker-container/**]
BasedOnStyles = Loft, Google, Vale
Vale.Terms = NO

# Node provider, virtual machine, and machine management docs are spec/reference
# pages dense with Kubernetes annotation keys (e.g. kubevirt.vcluster.com/image-url,
# bcm.vcluster.com/network-name). These keys use lowercase domain components by
# spec. Vale.Terms cannot distinguish annotation key tokens from prose, and the
# TokenIgnores pattern breaks down on dotted/slashed identifiers in inline code.
[**/administer/node-providers/**]
BasedOnStyles = Loft, Google, Vale
Vale.Terms = NO

[**/administer/virtual-machines/**]
BasedOnStyles = Loft, Google, Vale
Vale.Terms = NO

[**/use-platform/machines/**]
BasedOnStyles = Loft, Google, Vale
Vale.Terms = NO

# parameters.mdx uses annotation key examples (e.g. example.vcluster.com/timezone)
# in prose to illustrate template variable access. Same false-positive root cause.
[**/administer/templates/parameters.mdx]
BasedOnStyles = Loft, Google, Vale
Vale.Terms = NO

# `metrics-backend-mtls` is a literal Kubernetes Secret name (must stay
# lowercase per RFC 1123), and "Deploy Grafana" is correct sentence case with
# a proper noun that Google.Headings doesn't recognize as one. Neither needs
# to change, so scope both rules off for this page instead of the vocab (which
# would create new false positives on the "grafana" anchors and reverse-proxy
# path used throughout the fleet monitoring pages).
[**/observability/deploy-with-argocd.mdx]
BasedOnStyles = Loft, Google, Vale
Vale.Terms = NO
Google.Headings = NO

# "Terminate" here always means the cloud/Kubernetes action of destroying a node or
# instance (matches the actual API names, e.g. ec2:TerminateInstances), not ending a
# session, so Google.WordList's stop/exit/cancel/end suggestion would be inaccurate.
# "GCP service account name" is a real GCP resource-name field, not a login username,
# so the account-name-to-username substitution is also a false positive. Scope the
# whole rule off for this page rather than editing the shared word list, since inline
# per-instance vale toggles proved unreliable across this page's wrapped list items
# and table cells.
[**/observability/nvsentinel-gpu-monitoring.mdx]
BasedOnStyles = Loft, Google, Vale
Google.WordList = NO

# Auto-generated by scripts/generate-platform-cli-index.js from
# vcluster/cli/vcluster_platform*.md. The regenerate-instructions comment
# references that file path in plain text, and command descriptions are
# copied verbatim from the CLI's own --help output. Vale.Terms fires on
# "vcluster"/"cli" in both. Do not hand-edit this file to silence Vale;
# fix the generator or the upstream CLI reference instead.
[**/_partials/reference/platform-cli-commands.mdx]
BasedOnStyles = Loft, Google, Vale
Vale.Terms = NO

# Meta and instruction files are not published documentation and are not linted
# by CI, which only runs on platform/, vcluster/, and vcluster_versioned_docs/.
# They are dense with code identifiers, title-case headings, frontmatter slugs,
# and deliberate wrong-usage examples, so prose linting produces only false
# positives here. Disable all styles for them.
[{CLAUDE,AGENTS}.md]
BasedOnStyles =

[.claude/**]
BasedOnStyles =

# CONTRIBUTING.md is a genuine contributor doc, so keep prose linting on. Its
# section headings use intentional title case, so disable only the heading rules.
[CONTRIBUTING.md]
Google.Headings = NO
Loft.imperative-headings = NO
