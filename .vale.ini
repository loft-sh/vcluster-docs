StylesPath = .github/styles
MinAlertLevel = warning

Vocab = Loft

[formats]
mdx = md

[*.{md,mdx}]
BasedOnStyles = Loft, Google, Vale
Vale.Spelling = NO

# Ignore JSX tags in .mdx files
BlockIgnores = '(<(?!(?i:Flow|Step)\b)([a-zA-Z]+)(?:\s+[^>]*)?>)([\s\S]*?)(<\/\2>)'
BlockIgnores = 'import .*'
BlockIgnores = '(<InterpolatedCodeBlock[\s\S]*?/>)'
BlockIgnores = '(<InterpolatedCodeBlock[^>]*>[\s\S]*?</InterpolatedCodeBlock>)'
BlockIgnores = '\[.+?\]\(https?://.+?\)'

TokenIgnores = (\(#.*\)),(\]\(),(http.*),({{<\s*\/?expand),(\!\[),(\d.*px),(\d\.\d\.\d),(\S*vcluster\.com/\S+)
TokenIgnores = (?<=\[[\s\S]+?\])\([^)]+\)
Google.OxfordComma = YES
Google.Quotes = NO
Google.Spacing = NO
Google.Latin = NO
Google.Will = NO

# Auto-generated config docs have camelCase terms in frontmatter description
# fields (e.g., "statefulSet", "coredns", "rbac") that trigger Vale.Terms
# false positives. These files are regenerated by hack/vcluster/partials/.
[**/configure/vcluster-yaml/**]
BasedOnStyles = Loft, Google, Vale
Vale.Terms = NO

# Quick-start guides contain CLI commands (vcluster create, vcluster connect,
# etc.) inside <Step> components. Vale.Terms fires on "vcluster" in code blocks
# because <Step> is intentionally excluded from BlockIgnores in this config.
[**/quick-start/**]
BasedOnStyles = Loft, Google, Vale
Vale.Terms = NO

# Security docs reference camelCase vcluster.yaml keys (e.g., networkPolicy,
# podSecurityStandard) in inline code spans. Vale.Terms fires on these as
# false positives since they are config identifiers, not prose.
[**/security/**]
BasedOnStyles = Loft, Google, Vale
Vale.Terms = NO

# Docker container deploy guides use the same <Flow>/<Step> pattern and contain
# vcluster CLI commands and file paths (e.g. /loft-sh/vcluster/releases/) inside
# <Step> components. Same root cause as quick-start above.
[**/deploy/control-plane/docker-container/**]
BasedOnStyles = Loft, Google, Vale
Vale.Terms = NO

# Node provider, virtual machine, and machine management docs are spec/reference
# pages dense with Kubernetes annotation keys (e.g. kubevirt.vcluster.com/image-url,
# bcm.vcluster.com/network-name). These keys use lowercase domain components by
# spec. Vale.Terms cannot distinguish annotation key tokens from prose, and the
# TokenIgnores pattern breaks down on dotted/slashed identifiers in inline code.
[**/administer/node-providers/**]
BasedOnStyles = Loft, Google, Vale
Vale.Terms = NO

[**/administer/virtual-machines/**]
BasedOnStyles = Loft, Google, Vale
Vale.Terms = NO

[**/use-platform/machines/**]
BasedOnStyles = Loft, Google, Vale
Vale.Terms = NO

# parameters.mdx uses annotation key examples (e.g. example.vcluster.com/timezone)
# in prose to illustrate template variable access. Same false-positive root cause.
[**/administer/templates/parameters.mdx]
BasedOnStyles = Loft, Google, Vale
Vale.Terms = NO
